name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-lint-test:
    name: API · ruff + pytest
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: shiftops
          POSTGRES_PASSWORD: shiftops
          POSTGRES_DB: shiftops
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U shiftops"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://shiftops:shiftops@localhost:5432/shiftops
      DATABASE_URL_SYNC: postgresql+psycopg://shiftops:shiftops@localhost:5432/shiftops
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-test-secret-please-change-32chars
      TG_BOT_TOKEN: ""
      TG_WEBHOOK_SECRET: ""
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - name: Git revision
        # Makes it obvious which commit ran (e.g. alembic fixes after f740a86).
        run: git -C "${{ github.workspace }}" log -1 --oneline
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: "pip" }
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Ruff
        run: ruff check .
      - name: Alembic upgrade head
        run: alembic upgrade head
      - name: Verify database at Alembic head
        run: |
          alembic current | tee alembic-current.txt
          grep -E '\(head\)' alembic-current.txt \
            || { echo "::error::Database revision is not head — migrations incomplete or branched"; exit 1; }
      # POSTGRES_USER is a superuser and (PG16+) cannot be demoted in-container.
      # Superusers always bypass RLS. Run integration tests as a normal role.
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Create app role and grants for RLS tests
        env:
          PGPASSWORD: shiftops
        run: |
          psql -h localhost -U shiftops -d shiftops -v ON_ERROR_STOP=1 <<'SQL'
          DO $do$ BEGIN
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'shiftops_app') THEN
              CREATE ROLE shiftops_app LOGIN PASSWORD 'shiftops' NOSUPERUSER NOBYPASSRLS;
            END IF;
          END $do$;
          GRANT CONNECT ON DATABASE shiftops TO shiftops_app;
          GRANT USAGE ON SCHEMA public TO shiftops_app;
          GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO shiftops_app;
          GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO shiftops_app;
          GRANT shiftops_rls_bypass TO shiftops_app;
          SQL
      # Fail fast on broken FORCE RLS / bypass grants before the rest of the suite.
      - name: Pytest (RLS integration gate)
        env:
          DATABASE_URL: postgresql+asyncpg://shiftops_app:shiftops@localhost:5432/shiftops
          DATABASE_URL_SYNC: postgresql+psycopg://shiftops_app:shiftops@localhost:5432/shiftops
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: ci-test-secret-please-change-32chars
          TG_BOT_TOKEN: ""
          TG_WEBHOOK_SECRET: ""
        run: pytest -q tests/test_rls_isolation.py --maxfail=1
      - name: Pytest
        env:
          DATABASE_URL: postgresql+asyncpg://shiftops_app:shiftops@localhost:5432/shiftops
          DATABASE_URL_SYNC: postgresql+psycopg://shiftops_app:shiftops@localhost:5432/shiftops
        run: pytest -q --ignore=tests/test_rls_isolation.py

  web-lint-test:
    name: Web · eslint + vitest + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run test
      - run: pnpm run build

  docker-build:
    name: Docker images
    runs-on: ubuntu-latest
    needs: [api-lint-test, web-lint-test]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: API image build
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          push: false
          tags: shiftops/api:${{ github.sha }}
      - name: Web image build
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          push: false
          tags: shiftops/web:${{ github.sha }}
