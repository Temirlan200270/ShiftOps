# Production deploy of apps/web to Vercel on every push to `main`.
#
# Requires repository secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
# (see docs/DEPLOY.md and DEPLOY_NEXT_STEPS.md).
#
# `vercel build` on GitHub runners does not embed Vercel Dashboard `NEXT_PUBLIC_*`
# the same way as cloud builds. We default to the Fly app from `apps/api/fly.toml`
# and docs; override via repository Variable or Secret if your deployment differs.
#
# If the same Vercel project is also connected to GitHub in the Vercel dashboard
# (Git → Production Branch), you may get two builds per push — disable one path:
# either keep this workflow, or use only Vercel's native Git integration.

name: Vercel Web

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy @shiftops/web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      # Vercel project must keep Root Directory = `apps/web` (see docs/DEPLOY.md).
      # Run the CLI from the *repository* root: if cwd is already `apps/web`, the
      # same setting is applied again → path .../apps/web/apps/web (Vercel error).
      - name: Pull Vercel env (production)
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      # NEXT_PUBLIC_* is embedded at build time. Do not read from GitHub *secrets*
      # with a `||` fallback: an empty secret name still yields "" and skips the
      # default, producing a broken client (404 to /api on the Next host). Use
      # repository Variables (vars.*) or the hardcoded defaults below.
      - name: Build (Vercel)
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'https://shiftops-api.fly.dev' }}
          NEXT_PUBLIC_TG_BOT_USERNAME: ${{ vars.NEXT_PUBLIC_TG_BOT_USERNAME || 'ShiftOpsBot' }}
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt to production
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "Deployed: $DEPLOY_URL"
