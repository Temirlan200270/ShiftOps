<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ShiftOps Pro | Sovereign Interactive Engine</title>
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            /* Design Tokens v1.2 PRO */
            --bg-base: #000000;
            --bg-glow: radial-gradient(circle at top right, #1E293B 0%, #0B1220 100%);
            --surface-glass: rgba(22, 33, 58, 0.6);
            --border-hairline: rgba(255, 255, 255, 0.08);
            
            --primary: #4F7CFF;
            --primary-glow: rgba(79, 124, 255, 0.3);
            --success: #30A46C;
            --warning: #F5A524;
            --critical: #E5484D;
            
            --text-main: #F8FAFC;
            --text-secondary: #CBD5E1;
            --text-muted: #94A3B8;

            --ease-linear: cubic-bezier(0.32, 0.72, 0, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-base);
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* --- APP SHELL --- */
        .app-shell {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg-glow);
            position: relative;
        }

        /* --- HEADER MAGIC --- */
        .header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            background: rgba(11, 18, 32, 0.8);
            border-bottom: 1px solid var(--border-hairline);
            z-index: 1000;
            transition: background 0.5s var(--ease-linear);
        }

        .logo {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.04em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-dot {
            width: 8px; height: 8px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--primary);
            animation: pulse-logo 2s infinite;
        }

        @keyframes pulse-logo {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        /* --- VIEW CONTAINER --- */
        .view-container {
            flex: 1;
            position: relative;
            overflow-y: auto;
            padding-bottom: 100px;
            scroll-behavior: smooth;
        }

        .view-container::-webkit-scrollbar { display: none; }

        /* --- CARDS & COMPONENTS --- */
        .glass-card {
            background: var(--surface-glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-hairline);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            transition: transform 0.2s var(--ease-linear);
        }

        .glass-card:active { transform: scale(0.98); }

        /* --- SCORE WIDGET --- */
        .score-display {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 20px;
        }

        .score-big { font-size: 42px; font-weight: 800; line-height: 1; letter-spacing: -0.05em; }
        .score-pct { font-size: 18px; color: var(--text-muted); margin-left: 4px; }

        /* --- PROGRESS BAR --- */
        .progress-track {
            height: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #82a3ff);
            width: 0%;
            transition: width 1s var(--ease-linear);
        }

        /* --- TASK ITEM --- */
        .task-row {
            display: flex;
            align-items: center;
            padding: 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 18px;
            margin-bottom: 10px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: 0.3s;
        }

        .task-row.critical { border-left: 4px solid var(--critical); }
        .task-row.done { opacity: 0.4; }
        .task-row.waived { border-left: 4px solid var(--warning); background: rgba(245, 165, 36, 0.05); }

        .checkbox {
            width: 26px; height: 26px;
            border: 2.5px solid var(--border-hairline);
            border-radius: 8px;
            margin-right: 16px;
            display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }

        .task-row.done .checkbox { background: var(--success); border-color: var(--success); }

        .task-body { flex: 1; }
        .task-t { font-weight: 600; font-size: 15px; margin-bottom: 2px; }
        .task-s { font-size: 11px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; }

        /* --- BUTTONS --- */
        .btn {
            padding: 18px;
            border-radius: 18px;
            border: none;
            font-weight: 700;
            font-size: 15px;
            display: flex; align-items: center; justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
        }

        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 20px var(--primary-glow); }
        .btn-secondary { background: var(--bg-elevated); color: white; border: 1px solid var(--border-hairline); }
        .btn-disabled { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }

        /* --- NAVIGATION --- */
        .nav-bar {
            position: fixed;
            bottom: 0; width: 100%;
            height: 85px;
            background: rgba(11, 18, 32, 0.9);
            backdrop-filter: blur(25px);
            border-top: 1px solid var(--border-hairline);
            display: flex; justify-content: space-around;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 1000;
        }

        .nav-item {
            flex: 1;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 5px; color: var(--text-muted); cursor: pointer; transition: 0.2s;
        }

        .nav-item.active { color: var(--primary); }
        .nav-ico { font-size: 22px; }
        .nav-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }

        /* --- BOTTOM SHEET --- */
        .sheet-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: none; align-items: flex-end;
        }

        .sheet {
            background: var(--bg-elevated);
            width: 100%;
            border-radius: 32px 32px 0 0;
            padding: 24px;
            transform: translateY(100%);
            transition: transform 0.4s var(--ease-linear);
        }

        .sheet-overlay.active { display: flex; }
        .sheet-overlay.active .sheet { transform: translateY(0); }

        .sheet-handle {
            width: 40px; height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            margin: 0 auto 24px;
        }

        /* --- CAMERA SCAN SIMULATION --- */
        .camera-view {
            width: 100%;
            aspect-ratio: 1;
            background: #000;
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 24px;
        }

        .scan-line {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px; background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            animation: scan 2s infinite linear;
            display: none;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        /* --- ANALYTICS ELEMENTS --- */
        .heatmap {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            margin-top: 16px;
        }

        .heat-cell {
            aspect-ratio: 1;
            border-radius: 6px;
            background: rgba(255,255,255,0.05);
        }

        .heat-cell.level-1 { background: #1e3a8a; }
        .heat-cell.level-2 { background: #2563eb; }
        .heat-cell.level-3 { background: #60a5fa; }

        /* --- DEV TOOLS --- */
        .dev-switcher {
            position: fixed; top: 75px; right: 15px;
            z-index: 5000;
            background: var(--primary);
            color: white; padding: 8px 14px;
            border-radius: 100px; font-size: 10px; font-weight: 800;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            cursor: pointer;
        }

    </style>
</head>
<body>

<div class="app-shell">
    <div class="dev-switcher" onclick="Engine.toggleRole()">ROLE: <span id="dev-role">OPERATOR</span></div>

    <header class="header" id="app-header">
        <div class="logo">
            <div class="logo-dot"></div>
            ShiftOps
        </div>
        <div id="header-right">
            <!-- Contextual Info -->
        </div>
    </header>

    <main class="view-container" id="view-port">
        <!-- Dynamic Views -->
    </main>

    <nav class="nav-bar" id="nav-bar">
        <!-- Dynamic Nav -->
    </nav>
</div>

<!-- Global Bottom Sheet -->
<div class="sheet-overlay" id="sheet-overlay" onclick="UI.closeSheet()">
    <div class="sheet" id="sheet" onclick="event.stopPropagation()">
        <div class="sheet-handle"></div>
        <div id="sheet-content"></div>
    </div>
</div>

<script>
    /**
     * SHIFTOPS SOVEREIGN ENGINE PRO
     */

    const Store = {
        role: 'operator', // 'operator' | 'owner'
        activeView: 'dashboard',
        shiftStatus: 'none', // 'none' | 'active'
        
        // PlovKhana Realistic Data
        tasks: [
            { id: 1, title: 'Температурный лист (Холодильник)', crit: true, photo: true, done: false, waiver: false },
            { id: 2, title: 'Запуск кофемашины и пролив', crit: true, photo: false, done: false, waiver: false },
            { id: 3, title: 'Маркировка соусов (Кухня)', crit: false, photo: true, done: false, waiver: false },
            { id: 4, title: 'Чистота гостевых санузлов', crit: false, photo: true, done: false, waiver: false },
            { id: 5, title: 'Сверка остатков бара', crit: false, photo: false, done: false, waiver: false }
        ],

        leaderboard: [
            { name: 'Александр В.', score: 98.4, status: 'ok' },
            { name: 'Иван Дорн', score: 72.1, status: 'warning' },
            { name: 'Мария К.', score: 94.0, status: 'ok' }
        ]
    };

    const Engine = {
        // FORMULA V1: 0.5*comp + 0.25*crit + 0.15*time + 0.1*photo
        calculateScore() {
            const total = Store.tasks.length;
            const done = Store.tasks.filter(t => t.done || t.waiver).length;
            const criticalTotal = Store.tasks.filter(t => t.crit).length;
            const criticalDone = Store.tasks.filter(t => t.crit && (t.done || t.waiver)).length;

            const comp = done / total;
            const crit = criticalDone === criticalTotal ? 1.0 : 0.0;
            const time = 1.0; // Simulated
            const quality = 1.0; // Simulated

            const score = 100 * (0.50 * comp + 0.25 * crit + 0.15 * time + 0.10 * quality);
            return Math.round(score * 10) / 10;
        },

        toggleRole() {
            Store.role = Store.role === 'operator' ? 'owner' : 'operator';
            Store.activeView = Store.role === 'owner' ? 'overview' : 'dashboard';
            UI.init();
        },

        claimShift() {
            Store.shiftStatus = 'active';
            UI.haptic('impact');
            UI.render();
        }
    };

    const UI = {
        init() {
            document.getElementById('dev-role').innerText = Store.role.toUpperCase();
            this.renderNav();
            this.render();
        },

        render() {
            const viewPort = document.getElementById('view-port');
            const headerRight = document.getElementById('header-right');
            const appHeader = document.getElementById('app-header');
            
            // Header Color Logic
            const score = Engine.calculateScore();
            const hasCriticalWarning = Store.tasks.some(t => t.crit && !t.done && !t.waiver);
            
            if (Store.shiftStatus === 'active') {
                appHeader.style.background = hasCriticalWarning ? 'rgba(43, 18, 22, 0.9)' : 'rgba(11, 18, 32, 0.8)';
            }

            if (Store.role === 'owner') {
                headerRight.innerHTML = `<div style="width:32px; height:32px; border-radius:50%; background:var(--primary); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:12px; border: 1px solid var(--border-hairline);">АВ</div>`;
                this.renderOwnerViews(viewPort);
            } else {
                headerRight.innerHTML = `<div style="font-size:11px; font-weight:700; color:var(--text-muted);">02 МАЯ • ПЛОВХАНА #1</div>`;
                this.renderOperatorViews(viewPort);
            }
        },

        renderOperatorViews(container) {
            if (Store.shiftStatus === 'none') {
                container.innerHTML = `
                    <h1 style="font-size: 28px; font-weight: 800; margin-bottom: 24px; letter-spacing: -0.04em;">Посты</h1>
                    <div class="glass-card">
                        <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
                            <div style="font-weight:700; font-size:18px;">Основной Бар</div>
                            <div style="font-size:10px; font-weight:800; color:var(--primary); text-transform:uppercase;">Свободно</div>
                        </div>
                        <p style="font-size:13px; color:var(--text-muted); margin-bottom:20px;">Шаблон: Открытие (утро)</p>
                        <button class="btn btn-primary" onclick="Engine.claimShift()">⚡️ Занять пост</button>
                    </div>
                `;
            } else {
                const score = Engine.calculateScore();
                const doneCount = Store.tasks.filter(t => t.done || t.waiver).length;
                const progress = (doneCount / Store.tasks.length) * 100;

                container.innerHTML = `
                    <div class="glass-card" style="border-left: 4px solid var(--primary);">
                        <div class="score-display">
                            <div>
                                <div style="font-size:11px; font-weight:800; color:var(--primary); text-transform:uppercase; margin-bottom:4px;">Активная смена</div>
                                <h2 style="font-size:22px; font-weight:800;">Основной Бар</h2>
                            </div>
                            <div style="text-align:right">
                                <div class="score-big">${score}<span class="score-pct">/100</span></div>
                                <div style="font-size:9px; font-weight:700; color:var(--text-muted); text-transform:uppercase;">Текущий балл</div>
                            </div>
                        </div>
                        <div class="progress-track"><div class="progress-fill" style="width:${progress}%"></div></div>
                        <div style="font-size:12px; font-weight:600; color:var(--text-muted);">${doneCount} из ${Store.tasks.length} выполнено</div>
                    </div>

                    <div style="font-size:11px; font-weight:800; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.1em; margin:24px 0 12px 4px;">Чек-лист открытия</div>
                    
                    ${Store.tasks.map(t => `
                        <div class="task-row ${t.crit ? 'critical' : ''} ${t.done ? 'done' : ''} ${t.waiver ? 'waived' : ''}" onclick="UI.openTask(${t.id})">
                            <div class="checkbox">${t.done ? '✓' : ''}</div>
                            <div class="task-body">
                                <div class="task-t">${t.title}</div>
                                <div class="task-s">${t.crit ? '<span style="color:var(--critical)">Критическая</span>' : 'Обязательная'} ${t.photo ? '• ФОТО' : ''} ${t.waiver ? '• WAIVED' : ''}</div>
                            </div>
                            <div style="opacity:0.2">→</div>
                        </div>
                    `).join('')}

                    <button class="btn btn-secondary ${Store.tasks.some(t => t.crit && !t.done && !t.waiver) ? 'btn-disabled' : ''}" style="margin-top:20px;" onclick="UI.finishShift()">Завершить смену</button>
                `;
            }
        },

        renderOwnerViews(container) {
            if (Store.activeView === 'overview') {
                container.innerHTML = `
                    <h1 style="font-size: 28px; font-weight: 800; margin-bottom: 24px; letter-spacing: -0.04em;">Обзор сети</h1>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px;">
                        <div class="glass-card" style="margin:0; padding:16px;">
                            <div style="font-size:24px; font-weight:800;">94.2</div>
                            <div style="font-size:10px; font-weight:700; color:var(--text-muted); text-transform:uppercase;">Ср. балл</div>
                        </div>
                        <div class="glass-card" style="margin:0; padding:16px;">
                            <div style="font-size:24px; font-weight:800; color:var(--critical);">2</div>
                            <div style="font-size:10px; font-weight:700; color:var(--text-muted); text-transform:uppercase;">Нарушения</div>
                        </div>
                    </div>

                    <div style="font-size:11px; font-weight:800; color:var(--text-muted); text-transform:uppercase; margin-bottom:12px;">Интенсивность нарушений</div>
                    <div class="glass-card">
                        <div class="heatmap">
                            ${Array(28).fill(0).map((_, i) => `<div class="heat-cell level-${Math.floor(Math.random()*4)}"></div>`).join('')}
                        </div>
                    </div>

                    <div style="font-size:11px; font-weight:800; color:var(--text-muted); text-transform:uppercase; margin:24px 0 12px 4px;">Лидерборд (Score)</div>
                    ${Store.leaderboard.map(u => `
                        <div class="glass-card" style="padding:14px; display:flex; align-items:center; gap:12px; margin-bottom:8px;">
                            <div style="width:36px; height:36px; border-radius:50%; background:var(--bg-elevated); display:flex; align-items:center; justify-content:center; font-weight:800; color:${u.status === 'warning' ? 'var(--critical)' : 'var(--primary)'}">${u.name[0]}</div>
                            <div style="flex:1">
                                <div style="font-weight:700; font-size:14px;">${u.name}</div>
                                <div style="font-size:11px; color:var(--text-muted);">${u.status === 'warning' ? '3 нарушения' : 'Без нарушений'}</div>
                            </div>
                            <div style="font-weight:800; color:${u.status === 'warning' ? 'var(--critical)' : 'var(--success)'}">${u.score}</div>
                        </div>
                    `).join('')}
                `;
            } else {
                container.innerHTML = `<div style="text-align:center; padding:100px 20px; color:var(--text-muted); font-weight:700;">Раздел Команда в разработке</div>`;
            }
        },

        renderNav() {
            const nav = document.getElementById('nav-bar');
            let items = [];
            if (Store.role === 'operator') {
                items = [
                    { id: 'dashboard', lbl: 'Смена', ico: '🏠' },
                    { id: 'history', lbl: 'История', ico: '🕒' },
                    { id: 'profile', lbl: 'Профиль', ico: '👤' }
                ];
            } else {
                items = [
                    { id: 'overview', lbl: 'Обзор', ico: '📊' },
                    { id: 'team', lbl: 'Команда', ico: '👥' },
                    { id: 'kpi', lbl: 'KPI', ico: '📈' }
                ];
            }

            nav.innerHTML = items.map(i => `
                <div class="nav-item ${Store.activeView === i.id ? 'active' : ''}" onclick="UI.switchView('${i.id}')">
                    <div class="nav-ico">${i.ico}</div>
                    <div class="nav-lbl">${i.lbl}</div>
                </div>
            `).join('');
        },

        switchView(id) {
            Store.activeView = id;
            this.haptic('impact');
            this.renderNav();
            this.render();
        },

        openTask(id) {
            const task = Store.tasks.find(t => t.id === id);
            if (task.done) return;

            let content = `
                <h2 style="font-size:22px; font-weight:800; margin-bottom:12px;">${task.title}</h2>
                <p style="color:var(--text-muted); font-size:14px; margin-bottom:24px;">Соблюдайте стандарты чистоты и безопасности PlovKhana PRO.</p>
            `;

            if (task.photo) {
                content += `
                    <div class="camera-view">
                        <div class="scan-line" id="scan-line"></div>
                        <div style="font-size:40px;">📷</div>
                    </div>
                    <button class="btn btn-primary" onclick="UI.simulatePhoto(${task.id})">Снять и проверить pHash</button>
                `;
            } else {
                content += `<button class="btn btn-primary" onclick="UI.completeTask(${task.id})">Подтвердить выполнение</button>`;
            }

            content += `<button class="btn btn-secondary" style="margin-top:12px;" onclick="UI.requestWaiver(${task.id})">Не могу выполнить</button>`;

            this.openSheet(content);
        },

        simulatePhoto(id) {
            const line = document.getElementById('scan-line');
            line.style.display = 'block';
            this.haptic('impact');
            
            setTimeout(() => {
                this.completeTask(id);
                this.haptic('notification');
                if (Engine.calculateScore() >= 100) this.celebrate();
            }, 1800);
        },

        requestWaiver(id) {
            this.openSheet(`
                <h2 style="font-size:22px; font-weight:800; margin-bottom:12px;">Освобождение</h2>
                <p style="color:var(--text-muted); font-size:14px; margin-bottom:24px;">Укажите причину невозможности выполнения.</p>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;">
                    <button class="btn btn-secondary" style="padding:12px;" onclick="UI.applyWaiver(${id}, 'Сломано')">🛠 Сломано</button>
                    <button class="btn btn-secondary" style="padding:12px;" onclick="UI.applyWaiver(${id}, 'Нет товара')">📦 Нет товара</button>
                </div>
                <textarea placeholder="Комментарий для админа..." style="width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--border-hairline); border-radius:12px; padding:12px; color:white; min-height:80px; margin-bottom:20px;"></textarea>
                <button class="btn btn-primary" onclick="UI.applyWaiver(${id})">Отправить запрос</button>
            `);
        },

        applyWaiver(id) {
            const task = Store.tasks.find(t => t.id === id);
            task.waiver = true;
            task.done = false;
            this.closeSheet();
            this.render();
            this.haptic('impact');
        },

        completeTask(id) {
            const task = Store.tasks.find(t => t.id === id);
            task.done = true;
            this.render();
            this.closeSheet();
        },

        finishShift() {
            if (Store.tasks.some(t => t.crit && !t.done && !t.waiver)) {
                this.haptic('error');
                alert("Нельзя закрыть смену! Выполните критические задачи.");
                return;
            }
            this.celebrate();
            this.haptic('notification');
            alert("Смена успешно закрыта! Балл: " + Engine.calculateScore());
            Store.shiftStatus = 'none';
            this.render();
        },

        openSheet(content) {
            document.getElementById('sheet-content').innerHTML = content;
            document.getElementById('sheet-overlay').classList.add('active');
        },

        closeSheet() {
            document.getElementById('sheet-overlay').classList.remove('active');
        },

        haptic(type) {
            console.log(`Haptic: ${type}`);
            // if (window.Telegram) ...
        },

        celebrate() {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.8 },
                colors: ['#4F7CFF', '#30A46C', '#ffffff']
            });
        }
    };

    // Bootstrap
    window.onload = () => UI.init();

</script>
</body>
</html>
