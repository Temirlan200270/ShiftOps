name: Deploy

# Production deployment pipeline.
#
# Phase 1 (current): Fly.io backend + Vercel frontend.
#   - Tag push ``v*`` or ``workflow_dispatch``: full release — Fly API (with
#     ``release_command`` → ``alembic upgrade head``) + Vercel web + Sentry.
#   - Push to ``main`` when ``apps/api/**`` changes: **backend only** — same Fly
#     deploy + migrations, без фронта (фронт уже уезжает через vercel-web.yml).
#   - Migrations always run in Fly ``release_command`` (see apps/api/fly.toml).
#
# Phase 2 (later, when we move to Hetzner): a separate workflow file
# ``deploy-hetzner.yml`` will replace this — keeping them as siblings makes
# the migration a one-line concurrency change rather than a rewrite.

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  meta:
    name: Decide deploy scope
    runs-on: ubuntu-latest
    outputs:
      deploy_api: ${{ steps.decide.outputs.deploy_api }}
      full_release: ${{ steps.decide.outputs.full_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        if: ${{ github.ref == 'refs/heads/main' }}
        with:
          filters: |
            api:
              - 'apps/api/**'

      - id: decide
        shell: bash
        run: |
          set -euo pipefail
          FULL=false
          API=false
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            FULL=true
            API=true
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            FULL=true
            API=true
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            if [[ "${{ steps.filter.outputs.api }}" == "true" ]]; then
              API=true
            fi
          fi
          echo "deploy_api=$API" >> "$GITHUB_OUTPUT"
          echo "full_release=$FULL" >> "$GITHUB_OUTPUT"

  backend:
    name: Deploy backend (Fly.io)
    runs-on: ubuntu-latest
    needs: meta
    if: needs.meta.outputs.deploy_api == 'true'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      # Free-tier app intentionally runs a single machine (`min_machines_running = 1`
      # in fly.toml). Past deploys have left orphan machines around — when that
      # happens, `fly deploy --strategy rolling` only converges the active one and
      # the load balancer keeps round-robining the stale replica, returning 404
      # for newly-added routes (#refresh, /team/members). `scale count 1` is
      # idempotent and cheap; it brings us back to a single up-to-date machine
      # before the deploy runs.
      - name: Reconcile machine count to 1
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl scale count 1 --yes --app shiftops-api

      - name: Deploy API + Worker
        working-directory: apps/api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy \
            --remote-only \
            --strategy rolling \
            --wait-timeout 300 \
            --image-label ${{ github.ref_name }}

      # Rolling deploy can briefly leave >1 machine; scale again so the LB
      # does not round-robin an old image (Team / locations 500 + "CORS").
      - name: Reconcile machine count to 1 (post-deploy)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl scale count 1 --yes --app shiftops-api

      - name: Show machines (post-deploy)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl machine list --app shiftops-api

      # release_command already runs `alembic upgrade head`; this confirms the running
      # machine sees the same head (catches partial deploys / wrong secrets).
      - name: Verify Alembic at head (post-deploy)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          flyctl ssh console -a shiftops-api \
            -C "sh -lc 'cd /app && alembic current'" 2>&1 | tee alembic-fly.txt
          grep -E '\(head\)' alembic-fly.txt \
            || { echo "::error::Production DB not at Alembic head — inspect release_command and alembic-fly.txt"; exit 1; }

      - name: Set Telegram webhook
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN_PROD }}
          TG_WEBHOOK_SECRET: ${{ secrets.TG_WEBHOOK_SECRET_PROD }}
          API_PUBLIC_URL: ${{ secrets.API_PUBLIC_URL_PROD }}
        run: |
          # Idempotent: Telegram dedupes identical webhook URLs.
          curl -fsS -X POST \
            "https://api.telegram.org/bot${TG_BOT_TOKEN}/setWebhook" \
            -d "url=${API_PUBLIC_URL}/api/v1/telegram/webhook" \
            -d "secret_token=${TG_WEBHOOK_SECRET}" \
            -d "drop_pending_updates=false" \
            -d "allowed_updates=[\"message\",\"callback_query\",\"my_chat_member\"]"

  frontend:
    name: Deploy frontend (Vercel)
    runs-on: ubuntu-latest
    environment: production
    needs: [meta, backend]
    if: needs.meta.outputs.full_release == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      # Do not set working-directory: apps/web here — Vercel Root Directory is
      # already `apps/web`; double-applying it breaks with .../apps/web/apps/web.
      - name: Pull Vercel env (production)
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      # See vercel-web.yml: avoid secrets.NEXT_PUBLIC_* with || fallback (empty secret → broken bundle).
      - name: Build (Vercel)
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'https://shiftops-api.fly.dev' }}
          NEXT_PUBLIC_TG_BOT_USERNAME: ${{ vars.NEXT_PUBLIC_TG_BOT_USERNAME || 'ShiftOpsBot' }}
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt artifact
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "Deployed: $DEPLOY_URL"
          echo "VERCEL_DEPLOY_URL=$DEPLOY_URL" >> "$GITHUB_ENV"

  # Runs only when ``frontend`` ran (tag / dispatch). On ``main`` API-only pushes
  # ``frontend`` is skipped → this job is skipped (no duplicate Sentry for every merge).
  release-notes:
    name: Notify Sentry
    runs-on: ubuntu-latest
    needs: [meta, backend, frontend]
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
    steps:
      - uses: actions/checkout@v4

      # Skip silently when Sentry is not configured yet — this lets early
      # pilots run without forcing teams to set up Sentry on day one.
      - name: Sentry release
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        uses: getsentry/action-release@v1
        with:
          environment: production
          version: ${{ github.ref_name }}
