# Reverse proxy for ShiftOps production deployment.
# Drop into /etc/nginx/sites-available/ on Hetzner and symlink into sites-enabled.
# TLS is handled by certbot (LetsEncrypt) — see docs/DEPLOY.md.

upstream shiftops_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

upstream shiftops_web {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name shiftops.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name shiftops.example.com;

    ssl_certificate     /etc/letsencrypt/live/shiftops.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shiftops.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 25M;

    # Telegram webhook — small body, fast forward, no cache.
    location = /api/v1/telegram/webhook {
        proxy_pass http://shiftops_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # API + media proxy.
    location /api/ {
        proxy_pass http://shiftops_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # Health endpoints — never cache.
    location ~ ^/(healthz|readyz)$ {
        proxy_pass http://shiftops_api;
        access_log off;
    }

    # TWA (Next.js) — everything else.
    location / {
        proxy_pass http://shiftops_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
