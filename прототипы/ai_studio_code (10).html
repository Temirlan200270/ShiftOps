<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ShiftOps | Sovereign TWA Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0B1220;
            --bg-elevated: #0F172A;
            --surface: rgba(22, 33, 58, 0.6);
            --border: rgba(255, 255, 255, 0.08);
            --primary: #4F7CFF;
            --primary-glow: rgba(79, 124, 255, 0.3);
            --success: #30A46C;
            --warning: #F5A524;
            --critical: #E5484D;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            --ease: cubic-bezier(0.32, 0.72, 0, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text-main); 
            overflow: hidden; 
            height: 100vh;
            background: radial-gradient(circle at top right, #1e293b 0%, #0B1220 100%);
        }

        /* --- LAYOUT --- */
        .app-shell {
            max-width: 420px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header {
            padding: 16px 20px;
            display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            background: rgba(11, 18, 32, 0.8);
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .logo { font-size: 19px; font-weight: 800; display: flex; align-items: center; gap: 10px; letter-spacing: -0.04em; }
        .logo-dot { width: 8px; height: 8px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 15px var(--primary); }

        .view-container { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .view-container::-webkit-scrollbar { display: none; }

        /* --- NAVIGATION --- */
        .tab-bar {
            position: absolute; bottom: 0; width: 100%; height: 85px;
            background: rgba(11, 18, 32, 0.9); backdrop-filter: blur(25px);
            border-top: 1px solid var(--border); display: flex;
            justify-content: space-around; padding-top: 10px;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 1000;
        }

        .tab-item {
            display: flex; flex-direction: column; align-items: center;
            color: var(--text-muted); font-size: 10px; font-weight: 600; gap: 6px;
            cursor: pointer; transition: 0.2s;
        }
        .tab-item.active { color: var(--primary); }
        .tab-item svg { width: 24px; height: 24px; stroke-width: 2.2; }

        /* --- COMPONENT: GLASS CARD --- */
        .glass-card {
            background: var(--surface); backdrop-filter: blur(16px);
            border-radius: 24px; border: 1px solid var(--border);
            padding: 24px; margin-bottom: 16px; position: relative;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        /* --- COMPONENT: BUTTONS --- */
        .btn {
            padding: 16px; border-radius: 16px; font-weight: 700; font-size: 15px;
            border: none; cursor: pointer; display: flex; align-items: center;
            justify-content: center; gap: 10px; transition: 0.2s var(--ease);
        }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 20px var(--primary-glow); }
        .btn-primary:active { transform: scale(0.96); }
        .btn-secondary { background: var(--bg-elevated); color: white; border: 1px solid var(--border); }
        .btn-disabled { opacity: 0.3; cursor: not-allowed; filter: grayscale(1); }

        /* --- SHIFT SCORE WIDGET --- */
        .score-box { text-align: right; }
        .score-val { font-size: 28px; font-weight: 800; line-height: 1; color: var(--primary); }
        .score-lbl { font-size: 9px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-top: 4px; }

        /* --- PROGRESS BAR --- */
        .prog-track { height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; margin: 16px 0; }
        .prog-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.6s var(--ease); }

        /* --- TASK LIST --- */
        .task-row {
            display: flex; align-items: center; padding: 18px;
            background: rgba(255,255,255,0.03); border-radius: 18px;
            margin-bottom: 10px; border: 1px solid transparent; cursor: pointer;
            transition: 0.2s var(--ease);
        }
        .task-row:active { transform: scale(0.98); background: rgba(255,255,255,0.06); }
        .task-row.critical { border-left: 4px solid var(--critical); }
        .task-row.done { opacity: 0.5; }
        
        .checkbox {
            width: 26px; height: 26px; border-radius: 8px;
            border: 2px solid var(--border); margin-right: 16px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .task-row.done .checkbox { background: var(--success); border-color: var(--success); }

        /* --- BOTTOM SHEET --- */
        .sheet-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px); z-index: 2000;
            display: none; align-items: flex-end;
        }
        .sheet-overlay.active { display: flex; }
        .sheet {
            background: var(--bg-elevated); width: 100%; border-radius: 32px 32px 0 0;
            padding: 32px 24px; transform: translateY(100%);
            transition: transform 0.4s var(--ease);
        }
        .sheet-overlay.active .sheet { transform: translateY(0); }
        .sheet-handle { width: 40px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin: -16px auto 24px; }

        /* --- ANALYTICS HEATMAP --- */
        .heatmap { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 15px; }
        .heat-cell { aspect-ratio: 1; border-radius: 4px; background: rgba(255,255,255,0.05); }
        .heat-cell.active { background: var(--primary); opacity: 0.8; }

        /* --- DEV SWITCHER --- */
        .dev-badge {
            position: fixed; top: 75px; right: 15px; z-index: 5000;
            background: var(--primary); color: white; padding: 6px 12px;
            border-radius: 12px; font-size: 10px; font-weight: 800;
            cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        /* --- PULSE --- */
        .pulse { width: 8px; height: 8px; background: var(--success); border-radius: 50%; display: inline-block; margin-right: 8px; animation: pulse-anim 2s infinite; }
        @keyframes pulse-anim { 
            0% { box-shadow: 0 0 0 0 rgba(48, 164, 108, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(48, 164, 108, 0); }
            100% { box-shadow: 0 0 0 0 rgba(48, 164, 108, 0); }
        }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="dev-badge" onclick="Engine.toggleRole()">ROLE: <span id="dev-role">OPERATOR</span></div>

    <header class="header">
        <div class="logo"><div class="logo-dot"></div> ShiftOps</div>
        <div id="header-ctx" style="font-size: 12px; font-weight: 700; color: var(--text-muted);">PlovKhana #1</div>
    </header>

    <main class="view-container" id="main-view">
        <!-- Views injected by JS -->
    </main>

    <nav class="tab-bar" id="tab-bar">
        <!-- Tabs injected by JS -->
    </nav>
</div>

<!-- Global Bottom Sheet -->
<div class="sheet-overlay" id="sheet-overlay" onclick="UI.closeSheet()">
    <div class="sheet" id="sheet" onclick="event.stopPropagation()">
        <div class="sheet-handle"></div>
        <div id="sheet-content"></div>
    </div>
</div>

<script>
    /**
     * SHIFTOPS SOVEREIGN ENGINE
     * Единственный источник правды для логики и UI
     */

    const Store = {
        role: 'operator', // 'operator' | 'owner'
        shiftStatus: 'none', // 'none' | 'scheduled' | 'active'
        activeTab: 'shift',
        
        tasks: [
            { id: 1, title: 'Проверка кассовой смены', crit: true, photo: true, done: false },
            { id: 2, title: 'Запуск вытяжки (кухня)', crit: true, photo: false, done: false },
            { id: 3, title: 'Маркировка заготовок', crit: false, photo: true, done: false },
            { id: 4, title: 'Чистота гостевого зала', crit: false, photo: true, done: false },
            { id: 5, title: 'Настройка помола кофе', crit: false, photo: false, done: false }
        ],

        // Claim Model Mock
        availableSlots: [
            { id: 's1', label: 'Бар 1 (Основной)', template: 'Открытие' },
            { id: 's2', label: 'Бар 2 (Терраса)', template: 'Открытие' }
        ]
    };

    const Engine = {
        // Формула из SCORE_FORMULA.md
        calculateScore() {
            const total = Store.tasks.length;
            const done = Store.tasks.filter(t => t.done).length;
            const criticalTotal = Store.tasks.filter(t => t.crit).length;
            const criticalDone = Store.tasks.filter(t => t.crit && t.done).length;
            
            const completion = done / total;
            const criticalCompliance = criticalDone === criticalTotal ? 1.0 : 0.0;
            const photoQuality = 1.0; // Mock
            const timeliness = 1.0; // Mock

            const score = 100 * (0.50 * completion + 0.25 * criticalCompliance + 0.15 * timeliness + 0.10 * photoQuality);
            return Math.round(score);
        },

        toggleRole() {
            Store.role = Store.role === 'operator' ? 'owner' : 'operator';
            Store.activeTab = Store.role === 'owner' ? 'overview' : 'shift';
            document.getElementById('dev-role').innerText = Store.role.toUpperCase();
            UI.renderAll();
        },

        claimShift(id) {
            Store.shiftStatus = 'active';
            UI.renderAll();
            UI.haptic('impact');
        }
    };

    const UI = {
        renderAll() {
            this.renderTabs();
            this.renderView();
        },

        renderTabs() {
            const container = document.getElementById('tab-bar');
            let tabs = [];
            
            if (Store.role === 'operator') {
                tabs = [
                    { id: 'shift', label: 'Смена', icon: '🏠' },
                    { id: 'history', label: 'История', icon: '🕒' }
                ];
            } else {
                tabs = [
                    { id: 'overview', label: 'Обзор', icon: '📊' },
                    { id: 'team', label: 'Команда', icon: '👥' },
                    { id: 'templates', label: 'Шаблоны', icon: '📝' }
                ];
            }

            container.innerHTML = tabs.map(t => `
                <div class="tab-item ${Store.activeTab === t.id ? 'active' : ''}" onclick="UI.switchTab('${t.id}')">
                    <div style="font-size: 24px;">${t.icon}</div>
                    <span>${t.label}</span>
                </div>
            `).join('');
        },

        switchTab(id) {
            Store.activeTab = id;
            this.renderAll();
        },

        renderView() {
            const container = document.getElementById('main-view');
            
            if (Store.activeTab === 'shift') {
                if (Store.shiftStatus === 'none') {
                    container.innerHTML = `
                        <h1 style="font-size: 28px; font-weight: 800; margin-bottom: 24px; letter-spacing: -0.04em;">Доступные посты</h1>
                        ${Store.availableSlots.map(s => `
                            <div class="glass-card">
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                                    <div style="font-weight: 700; font-size: 18px;">${s.label}</div>
                                    <div style="font-size: 10px; color: var(--primary); font-weight: 800; text-transform: uppercase;">Свободно</div>
                                </div>
                                <div style="font-size: 13px; color: var(--text-muted); margin-bottom: 20px;">Шаблон: ${s.template}</div>
                                <button class="btn btn-primary" style="width: 100%;" onclick="Engine.claimShift('${s.id}')">⚡️ Занять пост</button>
                            </div>
                        `).join('')}
                    `;
                } else {
                    const score = Engine.calculateScore();
                    const doneCount = Store.tasks.filter(t => t.done).length;
                    const progress = (doneCount / Store.tasks.length) * 100;

                    container.innerHTML = `
                        <div class="glass-card" style="border-left: 4px solid var(--primary);">
                            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                                <div>
                                    <div style="font-size: 11px; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px;">Активная смена</div>
                                    <h2 style="font-size: 22px; font-weight: 800;">Бар 1 (Основной)</h2>
                                </div>
                                <div class="score-box">
                                    <div class="score-val">${score}</div>
                                    <div class="score-lbl">Score</div>
                                </div>
                            </div>
                            <div class="prog-track"><div class="prog-fill" style="width: ${progress}%"></div></div>
                            <div style="font-size: 12px; font-weight: 600; color: var(--text-muted);">
                                ${doneCount} из ${Store.tasks.length} задач выполнено
                            </div>
                        </div>

                        <div style="font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin: 24px 0 12px 4px;">Чек-лист открытия</div>
                        ${Store.tasks.map(t => `
                            <div class="task-row ${t.crit ? 'critical' : ''} ${t.done ? 'done' : ''}" onclick="UI.openTask('${t.id}')">
                                <div class="checkbox">${t.done ? '✓' : ''}</div>
                                <div style="flex: 1;">
                                    <div style="font-weight: 600; font-size: 15px;">${t.title}</div>
                                    <div style="font-size: 11px; color: var(--text-muted); margin-top: 2px;">
                                        ${t.crit ? '<span style="color: var(--critical)">Критическая</span>' : 'Обязательная'}
                                        ${t.photo ? ' • С фото' : ''}
                                    </div>
                                </div>
                                <div style="color: var(--text-muted); opacity: 0.3;">→</div>
                            </div>
                        `).join('')}
                        
                        <button class="btn btn-secondary ${Store.tasks.filter(t => t.crit && !t.done).length > 0 ? 'btn-disabled' : ''}" style="margin-top: 20px; width: 100%;">Закрыть смену</button>
                    `;
                }
            } else if (Store.activeTab === 'overview') {
                container.innerHTML = `
                    <h1 style="font-size: 28px; font-weight: 800; margin-bottom: 24px; letter-spacing: -0.04em;">Обзор сети</h1>
                    <div class="glass-card">
                        <div style="display: flex; align-items: center; margin-bottom: 20px;">
                            <div class="pulse"></div>
                            <span style="font-size: 13px; font-weight: 700;">4 заведения онлайн</span>
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                            <div style="background: rgba(255,255,255,0.03); padding: 16px; border-radius: 18px; border: 1px solid var(--border);">
                                <div style="font-size: 24px; font-weight: 800;">94.2</div>
                                <div style="font-size: 10px; color: var(--text-muted); font-weight: 700; text-transform: uppercase;">Ср. балл</div>
                            </div>
                            <div style="background: rgba(255,255,255,0.03); padding: 16px; border-radius: 18px; border: 1px solid var(--border);">
                                <div style="font-size: 24px; font-weight: 800; color: var(--critical);">2</div>
                                <div style="font-size: 10px; color: var(--text-muted); font-weight: 700; text-transform: uppercase;">Нарушения</div>
                            </div>
                        </div>
                    </div>

                    <div style="font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px;">Интенсивность по дням</div>
                    <div class="glass-card">
                        <div class="heatmap">
                            ${Array(28).fill(0).map((_, i) => `<div class="heat-cell ${i > 20 ? 'active' : ''}"></div>`).join('')}
                        </div>
                    </div>
                `;
            } else {
                container.innerHTML = `<div class="glass-card" style="text-align: center; padding: 60px 20px; color: var(--text-muted);">Раздел в разработке</div>`;
            }
        },

        openTask(id) {
            const task = Store.tasks.find(t => t.id == id);
            if (task.done) return;

            let content = `
                <h2 style="font-size: 20px; font-weight: 800; margin-bottom: 12px;">${task.title}</h2>
                <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 24px;">Выполните задачу согласно стандартам PlovKhana.</p>
            `;

            if (task.photo) {
                content += `
                    <div style="width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 20px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden;">
                        <div id="scan-line" style="position: absolute; top:0; left:0; right:0; height:2px; background: var(--primary); box-shadow: 0 0 15px var(--primary); display: none; animation: scan 1.5s infinite linear;"></div>
                        <span style="font-size: 40px;">📷</span>
                    </div>
                    <button class="btn btn-primary" style="width: 100%;" onclick="UI.simulateCapture(${task.id})">Сделать фото</button>
                `;
            } else {
                content += `<button class="btn btn-primary" style="width: 100%;" onclick="UI.completeTask(${task.id})">Выполнить</button>`;
            }

            content += `<button class="btn btn-secondary" style="width: 100%; margin-top: 12px;" onclick="UI.closeSheet()">Отмена</button>`;

            this.openSheet(content);
        },

        simulateCapture(id) {
            const line = document.getElementById('scan-line');
            line.style.display = 'block';
            this.haptic('impact');
            
            setTimeout(() => {
                this.completeTask(id);
                this.closeSheet();
                this.haptic('notification');
            }, 1500);
        },

        completeTask(id) {
            const task = Store.tasks.find(t => t.id == id);
            task.done = true;
            this.renderAll();
            this.closeSheet();
        },

        openSheet(content) {
            document.getElementById('sheet-content').innerHTML = content;
            document.getElementById('sheet-overlay').classList.add('active');
        },

        closeSheet() {
            document.getElementById('sheet-overlay').classList.remove('active');
        },

        haptic(type) {
            console.log(`Haptic: ${type}`);
            // В реальном TWA: window.Telegram.WebApp.HapticFeedback...
        }
    };

    // Style helper for scan animation
    const style = document.createElement('style');
    style.innerHTML = `@keyframes scan { from { top: 0%; } to { top: 100%; } }`;
    document.head.appendChild(style);

    // Bootstrap
    UI.renderAll();
</script>

</body>
</html>
