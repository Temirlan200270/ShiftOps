# Production deploy of apps/web to Vercel on every push to `main`.
#
# Requires repository secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
# (see docs/DEPLOY.md and DEPLOY_NEXT_STEPS.md).
#
# If the same Vercel project is also connected to GitHub in the Vercel dashboard
# (Git → Production Branch), you may get two builds per push — disable one path:
# either keep this workflow, or use only Vercel's native Git integration.

name: Vercel Web

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - ".github/workflows/vercel-web.yml"
  workflow_dispatch:

concurrency:
  group: vercel-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy @shiftops/web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel env (production)
        working-directory: apps/web
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build (Vercel)
        working-directory: apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt to production
        working-directory: apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "Deployed: $DEPLOY_URL"
