<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ShiftOps Pro Interactive</title>
    <style>
        :root {
            --bg: #000000;
            --surface: #0c0c0e;
            --card: #151518;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #ffffff;
            --blue: #2f80ed;
            --text-main: #ffffff;
            --text-muted: #86868b;
            --success: #32d74b;
            --warning: #ffd60a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text-main); font-family: -apple-system, system-ui, sans-serif; overflow: hidden; }

        .app { max-width: 420px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; position: relative; border-right: 1px solid #111; border-left: 1px solid #111; }

        /* HEADER */
        .header { padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 50; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .logo { font-size: 17px; font-weight: 800; display: flex; align-items: center; gap: 8px; letter-spacing: -0.4px; }
        .logo-dot { width: 6px; height: 6px; background: var(--blue); border-radius: 50%; box-shadow: 0 0 10px var(--blue); }
        .user-avatar { width: 32px; height: 32px; background: var(--card); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; border: 1px solid var(--border); color: var(--blue); }

        /* CONTENT AREA */
        .scroll-area { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 100px; -webkit-overflow-scrolling: touch; display: none; }
        .scroll-area.active { display: block; }
        .scroll-area::-webkit-scrollbar { display: none; }

        /* WIDGETS */
        .widget-live { background: linear-gradient(145deg, #151518 0%, #0c0c0e 100%); border-radius: 20px; padding: 18px; border: 1px solid var(--border); margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
        .live-info { display: flex; flex-direction: column; gap: 4px; }
        .live-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--success); font-weight: 800; display: flex; align-items: center; gap: 5px; }
        .live-dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .live-val { font-size: 16px; font-weight: 700; }

        /* GRID 2x2 */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
        .grid-item { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 12px; cursor: pointer; }
        .grid-item:active { transform: scale(0.96); background: #1c1c1f; }
        .grid-ico { width: 36px; height: 36px; border-radius: 10px; background: rgba(59, 128, 237, 0.1); display: flex; align-items: center; justify-content: center; color: var(--blue); }
        .grid-title { font-size: 15px; font-weight: 600; }
        .grid-sub { font-size: 11px; color: var(--text-muted); }

        /* PROGRESS CARD */
        .progress-card { background: var(--card); border-radius: 24px; padding: 24px; border: 1px solid var(--border); margin-bottom: 24px; }
        .prog-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .prog-title { font-size: 20px; font-weight: 700; }
        .prog-bar { height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; margin-bottom: 20px; }
        .prog-fill { height: 100%; background: var(--blue); width: 0%; transition: width 0.4s ease; }

        /* BUTTONS */
        .btn-group { display: flex; gap: 10px; }
        .btn-main { background: #fff; color: #000; border: none; flex: 1; padding: 16px; border-radius: 14px; font-size: 15px; font-weight: 700; cursor: pointer; }
        .btn-secondary { background: var(--surface); color: #fff; border: 1px solid var(--border); flex: 1; padding: 16px; border-radius: 14px; font-size: 15px; font-weight: 700; cursor: pointer; }
        .btn-main:active, .btn-secondary:active { transform: scale(0.97); }

        /* LIST */
        .sec-title { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin: 0 0 10px 4px; }
        .list { background: var(--card); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 24px; }
        .item { padding: 16px 20px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .item:last-child { border-bottom: none; }
        .item:active { background: rgba(255,255,255,0.02); }
        .item-t { font-size: 15px; font-weight: 600; }
        .item-s { font-size: 12px; color: var(--text-muted); margin-left: auto; }

        /* TABS */
        .tabs { position: absolute; bottom: 0; width: 100%; height: 74px; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; padding-bottom: 10px; z-index: 100; }
        .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: var(--text-muted); cursor: pointer; border: none; background: none; }
        .tab.active { color: #fff; }
        .tab svg { width: 22px; height: 22px; stroke-width: 2.2; }
        .tab-lbl { font-size: 10px; font-weight: 600; }

        /* MODAL SHEET */
        .sheet-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); display: none; align-items: flex-end; z-index: 200; }
        .sheet-overlay.active { display: flex; }
        .sheet { background: var(--surface); width: 100%; border-radius: 24px 24px 0 0; padding: 20px; transform: translateY(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-top: 1px solid var(--border); }
        .sheet-overlay.active .sheet { transform: translateY(0); }
        .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .task-item { display: flex; align-items: center; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
        .checkbox { width: 22px; height: 22px; border: 2px solid #333; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .checkbox.checked { background: var(--blue); border-color: var(--blue); }
        .checkbox.checked::after { content: '✓'; color: #fff; }

        /* DEBUG */
        .debug { background: #1c1c1e; padding: 12px; border-radius: 14px; margin-bottom: 20px; border: 1px dashed #444; }
        .seg { display: flex; gap: 4px; background: #000; padding: 2px; border-radius: 8px; margin-top: 8px; }
        .seg-btn { flex: 1; border: none; background: none; color: #555; padding: 8px; font-size: 11px; font-weight: 700; border-radius: 6px; cursor: pointer; }
        .seg-btn.on { background: #333; color: #fff; }
    </style>
</head>
<body>

<div class="app">
    <header class="header">
        <div class="logo"><div class="logo-dot"></div> ShiftOps</div>
        <div id="header-ctx"></div>
    </header>

    <!-- ЭКРАН: ОБЗОР (ГЛАВНАЯ) -->
    <main class="scroll-area active" id="view-home">
        <div class="debug">
            <div style="font-size: 10px; color: #888; font-weight: 800; text-transform: uppercase;">Демо: Переключение Роли</div>
            <div class="seg">
                <button class="seg-btn on" onclick="switchRole('owner', this)">Владелец</button>
                <button class="seg-btn" onclick="switchRole('operator', this)">Оператор</button>
            </div>
        </div>
        <div id="home-content"></div>
    </main>

    <!-- ЭКРАН: ИСТОРИЯ -->
    <main class="scroll-area" id="view-history">
        <div class="sec-title">История смен</div>
        <div class="list">
            <div class="item"><div><div class="item-t">Вчера, 01 мая</div><div style="font-size: 11px; color:#555">Утренняя смена • Александр В.</div></div><div class="item-s" style="color:var(--success)">5.0</div></div>
            <div class="item"><div><div class="item-t">30 апр</div><div style="font-size: 11px; color:#555">Вечерняя смена • Мария К.</div></div><div class="item-s" style="color:var(--warning)">4.2</div></div>
            <div class="item"><div><div class="item-t">29 апр</div><div style="font-size: 11px; color:#555">Утренняя смена • Иван С.</div></div><div class="item-s" style="color:var(--success)">4.8</div></div>
        </div>
    </main>

    <!-- ЭКРАН: КОМАНДА -->
    <main class="scroll-area" id="view-team">
        <div class="sec-title">Сотрудники</div>
        <div class="list">
            <div class="item"><div class="user-avatar" style="color:#fff">ИД</div><div class="item-t">Иван Дорн</div><div class="item-s">Бармен</div></div>
            <div class="item"><div class="user-avatar" style="color:#fff">МК</div><div class="item-t">Мария Кравец</div><div class="item-s">Админ</div></div>
            <div class="item"><div class="user-avatar" style="color:#fff">АС</div><div class="item-t">Алия С.</div><div class="item-s">Оператор</div></div>
        </div>
    </main>

    <!-- ТАББАР -->
    <nav class="tabs" id="tabbar"></nav>

    <!-- МОДАЛКА ЧЕК-ЛИСТА -->
    <div class="sheet-overlay" id="task-sheet" onclick="toggleSheet(false)">
        <div class="sheet" onclick="event.stopPropagation()">
            <div class="sheet-header"><div class="prog-title">Чек-лист</div><button onclick="toggleSheet(false)" style="background:none; border:none; color:var(--blue); font-weight:700;">Готово</button></div>
            <div id="task-list"></div>
        </div>
    </div>
</div>

<script>
    let state = {
        role: 'owner',
        view: 'home',
        shiftActive: true,
        tasks: [
            { id: 1, text: 'Проверить чистоту столов', done: true },
            { id: 2, text: 'Включить кофемашину', done: true },
            { id: 3, text: 'Снять кассовый отчет', done: false },
            { id: 4, text: 'Проверить сроки годности', done: false }
        ]
    };

    const ICONS = {
        home: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 12l9-9 9 9M5 10v10h14V10"></path></svg>`,
        history: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`,
        team: `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>`,
        profile: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>`,
        analytics: `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 8v8m-4-5v5m-4-2v2m-2 4h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>`
    };

    function switchRole(role, btn) {
        state.role = role;
        document.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('on'));
        btn.classList.add('on');
        render();
    }

    function switchView(view) {
        state.view = view;
        document.querySelectorAll('.scroll-area').forEach(v => v.classList.remove('active'));
        document.getElementById(`view-${view}`).classList.add('active');
        render();
    }

    function toggleTask(id) {
        const task = state.tasks.find(t => t.id === id);
        task.done = !task.done;
        render();
    }

    function toggleSheet(show) {
        document.getElementById('task-sheet').style.display = show ? 'flex' : 'none';
        if(show) setTimeout(() => document.getElementById('task-sheet').classList.add('active'), 10);
        else document.getElementById('task-sheet').classList.remove('active');
    }

    function render() {
        const homeContent = document.getElementById('home-content');
        const tabbar = document.getElementById('tabbar');
        const headerCtx = document.getElementById('header-ctx');
        const taskList = document.getElementById('task-list');

        // Header context
        headerCtx.innerHTML = state.role === 'owner' ? `<div class="user-avatar">АВ</div>` : `<div style="font-size:12px; font-weight:700; color:#555">02 МАЯ</div>`;

        // Home View Logic
        if (state.role === 'owner') {
            homeContent.innerHTML = `
                <div class="widget-live">
                    <div class="live-info">
                        <div class="live-label"><div class="live-dot"></div> Эфир</div>
                        <div class="live-val">4 чел. на смене</div>
                    </div>
                    <div class="live-info" style="align-items: flex-end;">
                        <div style="font-size: 10px; color: #555; font-weight: 800;">KPI СЕГОДНЯ</div>
                        <div class="live-val" style="color: var(--warning)">4.8 балла</div>
                    </div>
                </div>
                <div class="grid">
                    <div class="grid-item" onclick="alert('Аналитика')"><div class="grid-ico">${ICONS.analytics}</div><div><div class="grid-title">Аналитика</div><div class="grid-sub">Тренды</div></div></div>
                    <div class="grid-item" onclick="switchView('team')"><div class="grid-ico">${ICONS.team}</div><div><div class="grid-title">Команда</div><div class="grid-sub">Роли</div></div></div>
                </div>
                <div class="sec-title">Активная смена</div>
                ${renderShiftCard()}
            `;
        } else {
            homeContent.innerHTML = renderShiftCard();
        }

        // Tabbar Logic
        const tabs = state.role === 'owner' 
            ? [{id:'home', label:'Обзор', icon: ICONS.home}, {id:'history', label:'История', icon: ICONS.history}, {id:'team', label:'Команда', icon: ICONS.team}]
            : [{id:'home', label:'Смена', icon: ICONS.home}, {id:'history', label:'История', icon: ICONS.history}];
        
        tabbar.innerHTML = tabs.map(t => `<button class="tab ${state.view === t.id ? 'active' : ''}" onclick="switchView('${t.id}')">${t.icon}<span class="tab-lbl">${t.label}</span></button>`).join('');

        // Modal List Logic
        taskList.innerHTML = state.tasks.map(t => `
            <div class="task-item" onclick="toggleTask(${t.id})">
                <div class="checkbox ${t.done ? 'checked' : ''}"></div>
                <div class="task-t" style="${t.done ? 'text-decoration:line-through; color:#555' : ''}">${t.text}</div>
            </div>
        `).join('');

        // Update progress bars
        const doneCount = state.tasks.filter(t => t.done).length;
        const pct = (doneCount / state.tasks.length) * 100;
        document.querySelectorAll('.prog-fill').forEach(f => f.style.width = pct + '%');
        document.querySelectorAll('.prog-val').forEach(v => v.innerText = `${doneCount}/${state.tasks.length}`);
    }

    function renderShiftCard() {
        return `
            <div class="progress-card">
                <div class="prog-header">
                    <div>
                        <div class="prog-title">Утренняя смена</div>
                        <div style="font-size:12px; color:var(--text-muted)">Александр В. • 09:00 - 17:00</div>
                    </div>
                    <div class="prog-val" style="font-weight:800; color:var(--blue)">0/0</div>
                </div>
                <div class="prog-bar"><div class="prog-fill"></div></div>
                <div class="btn-group">
                    <button class="btn-main" onclick="toggleSheet(true)">Чек-лист</button>
                    <button class="btn-secondary" onclick="alert('Камера')">Камера</button>
                </div>
            </div>
        `;
    }

    render();
</script>

</body>
</html>
