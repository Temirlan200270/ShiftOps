<!DOCTYPE html>
<html lang="ru">
<!--
  Интерактивное демо ShiftOps (один HTML-файл).

  Не прод-код: локальные мок-данные и CDN Tailwind. Норматив токенов и поведение
  TWA — docs/DESIGN_SYSTEM.md + apps/web/app/globals.css. Не дублировать отсюда
  бизнес-логику в репозиторий.
-->
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ShiftOps — демо</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { so: { primary: '#4F7CFF', success: '#30A46C', warning: '#F5A524', critical: '#E5484D' } },
          fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
        },
      },
    };
  </script>
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <style>
    :root {
      /* База: максимально тёмные нейтрали (меньше «синей дымки», чем в v13-радиале) */
      --so-bg-base: #000000;
      --so-radial: radial-gradient(130% 95% at 90% -15%, #12121a 0%, #050508 48%, #000000 100%);
      --so-chrome: #030308;
      --so-header-stress: #2b1216;
      /* Поверхности: почти чёрные, без заметного синего тона */
      --so-surface-glass: rgba(10, 10, 14, 0.78);
      --so-surface-solid-top: #12121a;
      --so-surface-solid-bot: #0a0a0e;
      --so-border: rgba(255, 255, 255, 0.06);
      /* Бренд (фиксированный, = tailwind so.primary) */
      --so-brand: #4f7cff;
      --so-brand-glow: rgba(79, 124, 255, 0.32);
      /* Семантика (как в tailwind extend) */
      --so-success: #30a46c;
      --so-warning: #f5a524;
      --so-critical: #e5484d;
    }
    body {
      font-family: Inter, sans-serif;
      letter-spacing: -0.01em;
    }
    .inter-tight {
      letter-spacing: -0.04em;
    }
    .so-radial {
      background-color: var(--so-bg-base);
      background-image: var(--so-radial);
    }
    .so-glass {
      background: var(--so-surface-glass);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--so-border);
    }
    .so-card-solid {
      background: linear-gradient(155deg, var(--so-surface-solid-top) 0%, var(--so-surface-solid-bot) 100%);
      border: 1px solid var(--so-border);
    }
    .so-brand-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--so-brand);
      box-shadow: 0 0 12px var(--so-brand-glow);
    }
    .so-sec-title {
      margin-top: 1.5rem;
      margin-bottom: 0.5rem;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgb(100 116 139);
    }
    .so-sec-title:first-child {
      margin-top: 0;
    }
    .so-sec-title.so-sec-flush {
      margin-top: 0;
    }
    .so-press {
      transition: transform 0.1s ease;
    }
    .so-press:active {
      transform: scale(0.98);
    }
    @keyframes so-pulse-live {
      0%,
      100% {
        opacity: 1;
      }
      50% {
        opacity: 0.35;
      }
    }
    .so-pulse-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--so-success);
      box-shadow: 0 0 10px rgba(48, 164, 108, 0.45);
      animation: so-pulse-live 2s ease-in-out infinite;
    }
    .so-strip-critical { border-left: 4px solid var(--so-critical); }
    .touch-target { min-height: 48px; min-width: 48px; }
    .sheet-panel { transform: translateY(100%); transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1); }
    .sheet-panel.open { transform: translateY(0); }
    @media (prefers-reduced-motion: reduce) {
      .sheet-panel { transition: none; }
      .so-pulse-dot { animation: none; opacity: 1; }
      .so-press { transition: none; }
      .so-press:active { transform: none; }
      *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; }
    }
    @keyframes scanLine { 0% { transform: translateY(0); } 100% { transform: translateY(260px); } }
    .scan-anim { animation: scanLine 1.5s ease-in-out forwards; }
    .tabular { font-variant-numeric: tabular-nums; }
  </style>
</head>
<body class="min-h-[100dvh] so-radial text-slate-100 antialiased">
  <div id="app" class="mx-auto max-w-md min-h-[100dvh] flex flex-col"></div>
  <div id="sheet-mount"></div>
  <div id="modal-mount"></div>

  <script>
(function () {
  'use strict';

  var STORAGE = 'shiftops-demo-v2';
  var ONBOARD_KEY = 'shiftops-onboarding-v1';

  /** @typedef {'dashboard'|'tasks'|'summary'|'history'|'templatesList'|'templateEdit'|'audit'|'analytics'|'csvImport'|'businessHours'|'liveMonitor'|'swapRequests'|'team'|'settings'} ViewName */

  function tplOpeningKitchen() {
    return [
      { id: 'ok1', title: 'Температура холодильника и фото витрины', tier: 'critical', requiresPhoto: true, desc: 'Снимите витрину и термометр в кадре.' },
      { id: 'ok2', title: 'Мойка зоны приготовления', tier: 'critical', requiresPhoto: false, desc: 'Проверьте санитарию по чек-листу.' },
      { id: 'ok3', title: 'Запуск оборудования (плита, фритюр)', tier: 'required', requiresPhoto: false, desc: '' },
      { id: 'ok4', title: 'Заготовки соусов', tier: 'required', requiresPhoto: false, desc: '' },
      { id: 'ok5', title: 'Выкладка меню дня', tier: 'optional', requiresPhoto: false, desc: '' },
    ];
  }
  function tplClosingBar() {
    return [
      { id: 'cb1', title: 'Z-отчёт и фото кассы', tier: 'critical', requiresPhoto: true, desc: 'Нужен снимок экрана кассы для проверки.' },
      { id: 'cb2', title: 'Уборка бара и стульев', tier: 'critical', requiresPhoto: true, desc: 'Фото зоны бара.' },
      { id: 'cb3', title: 'Закрытие склада напитков', tier: 'required', requiresPhoto: false, desc: '' },
      { id: 'cb4', title: 'Инкассация (при необходимости)', tier: 'optional', requiresPhoto: false, desc: '' },
    ];
  }

  function instTasks(tplRows) {
    return tplRows.map(function (r) {
      return {
        id: r.id,
        title: r.title,
        tier: r.tier,
        requiresPhoto: r.requiresPhoto,
        desc: r.desc || '',
        status: 'pending',
        suspicious: false,
        inQueue: false,
      };
    });
  }

  function defaultStore() {
    return {
      version: 2,
      phase: 'splash',
      splashStarted: false,
      stack: ['dashboard'],
      role: 'operator',
      stressChrome: false,
      demoOffline: false,
      delaySeconds: 0,
      confettiDone: false,
      shift: null,
      vacant: [
        { id: 'v1', templateId: 'opening_kitchen', templateName: 'Открытие кухни', locationName: 'ПловХана · Центр', stationLabel: 'Кухня', slotIndex: 1 },
        { id: 'v2', templateId: 'closing_bar', templateName: 'Закрытие бара', locationName: 'ПловХана · Центр', stationLabel: 'Бар', slotIndex: 2 },
      ],
      templates: [
        { id: 'opening_kitchen', name: 'Открытие кухни', rows: tplOpeningKitchen() },
        { id: 'closing_bar', name: 'Закрытие бара', rows: tplClosingBar() },
      ],
      team: [
        { id: 'u1', name: 'Айгуль Н.', role: 'operator', active: true },
        { id: 'u2', name: 'Данияр К.', role: 'admin', active: true },
        { id: 'u3', name: 'Марат Т.', role: 'operator', active: false },
      ],
      auditEvents: [
        { t: Date.now() - 3600000, type: 'shift.started', msg: 'Смена начата · ПловХана #1' },
        { t: Date.now() - 1800000, type: 'task.completed', msg: 'Задача выполнена · Фото чистоты' },
        { t: Date.now() - 600000, type: 'waiver.requested', msg: 'Запрос исключения · нет товара' },
      ],
      swapRequests: {
        incoming: [{ id: 'sr1', from: 'Марат Т.', slot: 'Пт вечер', status: 'pending' }],
        outgoing: [{ id: 'sr2', to: 'Айгуль Н.', slot: 'Сб утро', status: 'sent' }],
      },
      locations: [
        { id: 'l1', name: 'ПловХана #1', violations: 2, live: true },
        { id: 'l2', name: 'ПловХана #2', violations: 0, live: true },
      ],
      businessHours: { mon: { o: '08:00', c: '23:00', off: false }, tue: { o: '08:00', c: '23:00', off: false }, wed: { o: '08:00', c: '23:00', off: false }, thu: { o: '08:00', c: '23:00', off: false }, fri: { o: '08:00', c: '24:00', off: false }, sat: { o: '09:00', c: '24:00', off: false }, sun: { o: '09:00', c: '22:00', off: false } },
      csvImport: { step: 0, name: '' },
      templateEditId: null,
      historyRows: [
        { id: 'h1', date: '2026-05-01', tpl: 'Закрытие бара', score: 94, status: 'closed_clean' },
        { id: 'h2', date: '2026-04-30', tpl: 'Открытие кухни', score: 88, status: 'closed_with_violations' },
      ],
      settings: { push: true, lang: 'ru' },
      onboardingSlide: 0,
      liveTick: 0,
      ui: { sheet: null, taskId: null, modal: null, camTask: null, camScan: false, waiver: null, waiverReason: 'Сломано' },
    };
  }

  var store = loadStore() || defaultStore();
  if (!store.version || store.version < 2) store = defaultStore();
  if (store.role !== 'owner' && store.role !== 'operator') store.role = 'operator';

  function loadStore() {
    try {
      var r = localStorage.getItem(STORAGE);
      if (!r) return null;
      return JSON.parse(r);
    } catch (e) {
      return null;
    }
  }
  function saveStore() {
    localStorage.setItem(STORAGE, JSON.stringify(store));
  }

  function canAdmin() {
    return store.role === 'owner';
  }
  function currentView() {
    return store.stack[store.stack.length - 1];
  }
  function pushView(v) {
    if (!canAdmin() && adminOnly(v)) return;
    store.stack.push(v);
    saveStore();
    render();
  }
  function popView() {
    if (store.stack.length > 1) store.stack.pop();
    saveStore();
    render();
  }
  function adminOnly(v) {
    return ['audit', 'analytics', 'businessHours', 'csvImport', 'liveMonitor', 'team', 'templatesList', 'templateEdit'].indexOf(v) >= 0;
  }

  function ensureTg() {
    if (window.Telegram && window.Telegram.WebApp) return;
    window.Telegram = {
      WebApp: {
        setHeaderColor: function () {},
        HapticFeedback: {
          impactOccurred: function () {
            if (navigator.vibrate) navigator.vibrate(15);
          },
          notificationOccurred: function (t) {
            if (navigator.vibrate) navigator.vibrate(t === 'error' ? [35, 25, 35] : [18, 40, 18]);
          },
        },
      },
    };
  }
  ensureTg();

  function tasksArr() {
    return (store.shift && store.shift.tasks) || [];
  }

  function scheduledEndTs() {
    var d = new Date();
    d.setHours(23, 0, 0, 0);
    return d.getTime();
  }

  function computeScore() {
    var tasks = tasksArr();
    var total = tasks.length;
    var done = 0;
    for (var i = 0; i < tasks.length; i++) {
      if (tasks[i].status === 'done' || tasks[i].status === 'waived') done++;
    }
    var completion = total ? done / total : 1;
    var critOk = !tasks.some(function (t) {
      return t.tier === 'critical' && t.status !== 'done' && t.status !== 'waived';
    });
    var criticalCompliance = critOk ? 1 : 0;
    var closed = store.shift && store.shift.status === 'closed';
    var delaySec = closed ? store.delaySeconds : Math.max(0, (Date.now() - scheduledEndTs()) / 1000);
    var timeliness = Math.max(0, 1 - delaySec / (2 * 3600));
    var photoDone = tasks.filter(function (t) {
      return t.requiresPhoto && t.status === 'done';
    });
    var pt = photoDone.length;
    var pu = photoDone.filter(function (t) {
      return !t.suspicious;
    }).length;
    var photoQuality = pt > 0 ? pu / pt : 1;
    var score = 100 * (0.5 * completion + 0.25 * criticalCompliance + 0.15 * timeliness + 0.1 * photoQuality);
    return { score: score, display: Math.round(score * 10) / 10, completion: completion, criticalCompliance: criticalCompliance, timeliness: timeliness, photoQuality: photoQuality };
  }

  function criticalBlocking() {
    return tasksArr().some(function (t) {
      return t.tier === 'critical' && t.status !== 'done' && t.status !== 'waived';
    });
  }

  function headerBg() {
    if (store.stressChrome && criticalBlocking()) return 'var(--so-header-stress)';
    return 'var(--so-chrome)';
  }

  function escapeHtml(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function fmtTime(ts) {
    return new Date(ts).toLocaleString('ru-RU', { dateStyle: 'short', timeStyle: 'short' });
  }

  function ruRole(role) {
    var m = { operator: 'Сотрудник смены', admin: 'Администратор', owner: 'Владелец' };
    return m[role] || role;
  }

  function tierLabel(tier) {
    var m = { critical: 'Срочно', required: 'Обязательно', optional: 'По возможности' };
    return m[tier] || tier;
  }

  function swapStatusRu(s) {
    var m = { pending: 'ждёт ответа', sent: 'отправлено' };
    return m[s] || s;
  }

  function fmtHeaderDate() {
    return new Date().toLocaleDateString('ru-RU', { weekday: 'short', day: 'numeric', month: 'short' });
  }

  /* ---------- RENDER ---------- */
  function render() {
    var root = document.getElementById('app');
    document.documentElement.style.setProperty('--so-chrome', '#030308');
    if (store.phase === 'splash') {
      renderSplash(root);
      bindGlobalClicksOnce();
      if (window.lucide) lucide.createIcons();
      return;
    }
    if (store.phase === 'onboarding') {
      renderOnboarding(root);
      bindGlobalClicksOnce();
      if (window.lucide) lucide.createIcons();
      return;
    }
    renderApp(root);
    bindGlobalClicksOnce();
    if (window.lucide) lucide.createIcons();
  }

  function renderSplash(root) {
    root.innerHTML =
      '<div class="flex flex-col min-h-[100dvh]">' +
      '<header class="so-glass border-b border-white/[0.06] px-5 pt-12 pb-6" style="background:' +
      headerBg() +
      '">' +
      '<div class="flex items-center gap-3"><div class="h-11 w-11 rounded-2xl so-glass flex items-center justify-center">' +
      '<span class="relative flex h-3 w-3"><span class="animate-ping absolute h-full w-full rounded-full bg-so-primary/50"></span>' +
      '<span class="relative rounded-full h-3 w-3 bg-so-primary"></span></span></div>' +
      '<div><p class="text-lg font-bold tracking-tight text-white">ShiftOps</p><p class="text-sm text-slate-400">Загрузка…</p></div></div></header>' +
      '<div class="flex-1 flex items-center justify-center p-8"><div class="w-full max-w-xs space-y-3">' +
      '<div class="h-3 bg-white/10 rounded animate-pulse"></div><div class="h-3 bg-white/5 rounded w-4/5 animate-pulse"></div>' +
      '<div class="h-32 so-glass rounded-2xl mt-6 animate-pulse"></div></div></div></div>';
    if (!store.splashStarted) {
      store.splashStarted = true;
      saveStore();
      setTimeout(function () {
        store.phase = localStorage.getItem(ONBOARD_KEY) ? 'app' : 'onboarding';
        saveStore();
        render();
      }, 450 + Math.random() * 400);
    }
  }

  function renderOnboarding(root) {
    var slides = [
      { t: 'ПловХана × ShiftOps', d: 'Чек-листы открытия и закрытия, фото к задачам и итоговый балл смены — в одном приложении в Telegram.' },
      { t: 'Проверка фото', d: 'Подозрительные снимки отмечаются автоматически; окончательное решение — за руководителем.' },
      { t: 'Готово', d: 'Дальше вы попадёте в интерактивную демонстрацию: всё работает на вашем телефоне, без подключения к серверу.' },
    ];
    var i = store.onboardingSlide | 0;
    if (i >= slides.length) i = slides.length - 1;
    root.innerHTML =
      '<div class="flex flex-col min-h-[100dvh] p-6 pt-14">' +
      '<div class="flex gap-1 mb-8">' +
      slides
        .map(function (_, j) {
          return '<div class="h-1 flex-1 rounded-full ' + (j === i ? 'bg-so-primary' : 'bg-white/10') + '"></div>';
        })
        .join('') +
      '</div>' +
      '<h1 class="text-2xl font-bold tracking-tight text-white mb-3">' +
      escapeHtml(slides[i].t) +
      '</h1>' +
      '<p class="text-slate-400 leading-relaxed mb-10">' +
      escapeHtml(slides[i].d) +
      '</p>' +
      '<div class="mt-auto space-y-3">' +
      (i < slides.length - 1
        ? '<button type="button" class="touch-target w-full rounded-2xl bg-so-primary text-white font-semibold" data-act="onb-next">Далее</button>'
        : '<button type="button" class="touch-target w-full rounded-2xl bg-so-primary text-white font-semibold" data-act="onb-done">В приложение</button>') +
      '<button type="button" class="touch-target w-full rounded-2xl border border-white/10 text-slate-400 text-sm" data-act="onb-skip">Пропустить</button>' +
      '</div></div>';
  }

  function renderTabBar() {
    var v = currentView();
    var tabs = canAdmin()
      ? [
          ['dashboard', 'home', 'Обзор'],
          ['team', 'users', 'Команда'],
          ['analytics', 'bar-chart-3', 'Сводка'],
          ['settings', 'settings', 'Настройки'],
        ]
      : [
          ['dashboard', 'home', 'Смена'],
          ['history', 'history', 'История'],
          ['settings', 'user', 'Профиль'],
        ];
    var html =
      '<nav class="fixed bottom-0 left-0 right-0 z-[95] mx-auto flex max-w-md border-t border-white/[0.06] bg-[rgba(3,3,8,0.96)] backdrop-blur-2xl pt-1 px-1 pb-[max(0.35rem,env(safe-area-inset-bottom))] shadow-[0_-8px_32px_rgba(0,0,0,0.55)]" role="tablist" aria-label="Разделы">';
    tabs.forEach(function (t) {
      var id = t[0];
      var ico = t[1];
      var lbl = t[2];
      var on = v === id;
      html +=
        '<button type="button" class="touch-target flex min-h-[52px] flex-1 flex-col items-center justify-center gap-0.5 rounded-xl py-1.5 ' +
        (on ? 'text-white' : 'text-slate-500') +
        '" data-act="tab-nav" data-view="' +
        id +
        '" role="tab" aria-selected="' +
        (on ? 'true' : 'false') +
        '">' +
        '<i data-lucide="' +
        ico +
        '" class="h-[22px] w-[22px] ' +
        (on ? 'text-so-primary' : '') +
        '"></i>' +
        '<span class="text-[10px] font-semibold leading-tight">' +
        escapeHtml(lbl) +
        '</span></button>';
    });
    html += '</nav>';
    return html;
  }

  function renderApp(root) {
    var v = currentView();
    var showBack = store.stack.length > 1;
    var showTabs = store.stack.length === 1;
    var critBanner = criticalBlocking() && store.shift && store.shift.status === 'active' && !store.stressChrome;
    var mainPad = showTabs ? 'pb-36' : 'pb-24';
    var fabBottom = showTabs
      ? 'bottom-[max(6.25rem,calc(5.5rem+env(safe-area-inset-bottom)))]'
      : 'bottom-[max(1rem,env(safe-area-inset-bottom))]';

    var titleBlock =
      (canAdmin() && v === 'dashboard'
        ? '<span class="mb-0.5 inline-block rounded-full border border-white/10 bg-so-primary/15 px-2 py-0.5 text-[10px] uppercase tracking-wider text-sky-300">Владелец</span>'
        : '') +
      '<p class="truncate text-[11px] uppercase leading-tight tracking-wider text-slate-400">' +
      viewTitle(v) +
      '</p>';

    var shell =
      '<div class="flex flex-col min-h-[100dvh] ' +
      mainPad +
      '">' +
      '<header class="sticky top-0 z-30 border-b border-white/[0.06] px-4 pt-[max(1.25rem,env(safe-area-inset-top))] pb-3 so-glass" style="background:' +
      headerBg() +
      '">' +
      (showBack
        ? '<div class="flex items-center gap-2">' +
          '<button type="button" class="touch-target -ml-1 rounded-xl px-2 text-slate-300 hover:bg-white/5" data-act="pop" aria-label="Назад"><i data-lucide="arrow-left" class="h-6 w-6"></i></button>' +
          '<div class="min-w-0 flex-1 text-center">' +
          titleBlock +
          '</div>' +
          '<div class="w-10 shrink-0" aria-hidden="true"></div></div>'
        : '<div class="flex items-center justify-between gap-3">' +
          '<div class="flex min-w-0 items-center gap-2">' +
          '<span class="so-brand-dot shrink-0" aria-hidden="true"></span>' +
          '<span class="inter-tight text-lg font-extrabold tracking-tighter text-white">ShiftOps</span></div>' +
          '<div class="min-w-0 flex-1 px-1 text-center">' +
          titleBlock +
          '</div>' +
          '<div class="max-w-[5.5rem] shrink-0 text-right text-[11px] font-medium tabular-nums leading-tight text-slate-500">' +
          escapeHtml(fmtHeaderDate()) +
          '</div></div>') +
      '</header>';

    if (critBanner) {
      shell +=
        '<div class="bg-critical/15 border-b border-critical/30 px-4 py-2 text-center text-sm text-red-200">' +

          ? '<span class="text-so-warning text-xs">На согласовании</span>'

    var critPhotoRule = t.tier === 'critical' && t.requiresPhoto;
    var actions = '';

      actions = '<div class="flex flex-col gap-2 shrink-0">';

        actions +=

          t.id +

          '<button type="button" class="touch-target px-3 rounded-xl bg-white/10 text-sm font-medium" data-act="task-done" data-tid="' +
          t.id +
          '">Выполнено</button>';

      if (critPhotoRule) {
        actions +=
          '<span class="text-[10px] text-slate-500 text-right">Срочно и с фото: только камера или исключение</span>';
      }
      actions +=
        '<button type="button" class="touch-target px-3 rounded-xl border border-so-warning/40 text-so-warning text-sm" data-act="open-waiver" data-tid="' +
        t.id +
        '">Запросить исключение</button></div>';
    }

    return (
      '<div class="so-glass rounded-xl p-3 ' +
      strip +
      ' flex justify-between gap-3 task-row" data-tid="' +
      t.id +
      '">' +

  function eventActElement(e) {
    var n = e.target;
    if (!n) return null;
    if (n.nodeType !== 1) n = n.parentElement;
    return n && n.closest ? n.closest('[data-act]') : null;
  }

  function handleGlobalAct(e) {
    var el = eventActElement(e);
    if (!el) return;
    if (!el.closest('#app') && !el.closest('#modal-mount') && !el.closest('#sheet-mount')) return;
    var act = el.getAttribute('data-act');
      if (act === 'pop') {
        popView();
        return;
      }
      if (act === 'push') {
        pushView(el.getAttribute('data-view'));
        return;
      }
      if (act === 'tab-nav') {
        var tn = el.getAttribute('data-view');
        if (!tn) return;
        if (!canAdmin() && adminOnly(tn)) return;
        store.stack = [tn];
        saveStore();
        render();
        return;
      }
      if (act === 'dev-role') {
        store.role = store.role === 'owner' ? 'operator' : 'owner';
        if (store.role === 'operator' && adminOnly(currentView())) store.stack = ['dashboard'];
        saveStore();
        render();
        return;
      }
      if (act === 'set-role') {
        var rr = el.getAttribute('data-role');
        if (rr !== 'owner' && rr !== 'operator') return;
        store.role = rr;
        if (store.role === 'operator' && adminOnly(currentView())) store.stack = ['dashboard'];
        saveStore();
        render();
        return;
      }
      if (act === 'dev-stress') {
        store.stressChrome = !store.stressChrome;
        saveStore();
        render();
        return;
      }
      if (act === 'onb-next') {
        store.onboardingSlide = (store.onboardingSlide | 0) + 1;
        saveStore();
        render();
        return;
      }
      if (act === 'onb-done' || act === 'onb-skip') {
        localStorage.setItem(ONBOARD_KEY, '1');
        store.phase = 'app';
        saveStore();
        render();
        return;
      }
      if (act === 'claim') {
        var vid = el.getAttribute('data-vid');
        var row = store.vacant.find(function (v) {
          return v.id === vid;
        });
        if (!row) return;
        var tpl = store.templates.find(function (t) {
          return t.id === row.templateId;
        });
        store.shift = {
          id: 'shift-demo',
          templateId: row.templateId,
          templateName: row.templateName,
          status: 'scheduled',
          stationLabel: row.stationLabel,
          slotIndex: row.slotIndex,
          operatorFullName: 'Данияр К.',
          scheduledStart: Date.now(),
          scheduledEnd: Date.now() + 8 * 3600000,
          tasks: instTasks(tpl.rows),
        };
        store.vacant = store.vacant.filter(function (v) {
          return v.id !== vid;
        });
        saveStore();
        render();
        return;
      }
      if (act === 'start-shift') {
        if (store.shift) store.shift.status = 'active';
        saveStore();
        pushView('tasks');
        return;
      }
      if (act === 'close-shift') {
        if (criticalBlocking()) {
          Tg().notificationOccurred('error');
          return;
        }
        if (store.shift) store.shift.status = 'closed';
        var d = computeScore().display;
        if (d > 99.9 && !store.confettiDone && typeof confetti === 'function') {
          store.confettiDone = true;
          confetti({ origin: { y: 0.9 }, particleCount: 100 });
        }
        saveStore();
        pushView('summary');
        return;
      }
      if (act === 'toggle-score') {
        var br = document.getElementById('score-br');
        if (br) br.classList.toggle('hidden');
        return;
      }
      if (act === 'delay') {
        store.delaySeconds = +el.value;
        saveStore();
        render();
        return;
      }
      if (act === 'toggle-offline') {
        store.demoOffline = !store.demoOffline;
        saveStore();
        render();
        return;
      }
      if (act === 'approve-waivers') {
        tasksArr().forEach(function (t) {
          if (t.status === 'waiver_pending') t.status = 'waived';
        });
        saveStore();
        render();
        return;
      }
      if (act === 'task-done') {
        var tid = el.getAttribute('data-tid');
        var task = tasksArr().find(function (t) {
          return t.id === tid;
        });
        if (!task || task.requiresPhoto) return;
        if (task.tier === 'critical' && task.requiresPhoto) return;
        task.status = 'done';
        Tg().impactOccurred();
        saveStore();
        render();
        return;
      }
      if (act === 'open-cam') {
        store.ui.modal = 'cam';
        store.ui.camTask = el.getAttribute('data-tid');
        store.ui.camScan = false;
        saveStore();
        render();
        return;
      }
      if (act === 'open-waiver') {
        store.ui.modal = 'waiver';
        store.ui.waiver = el.getAttribute('data-tid');
        store.ui.waiverReason = 'Сломано';
        saveStore();
        render();
        return;
      }
      if (act === 'open-task-sheet') {
        store.ui.sheet = 'task';
        store.ui.taskId = el.getAttribute('data-tid');
        saveStore();
        render();
        return;
      }
      if (act === 'close-sheet' || (act === 'close-sheet' && el.classList.contains('fixed'))) {
        store.ui.sheet = null;
        store.ui.taskId = null;
        saveStore();
        render();
        return;
      }
      if (act === 'edit-tpl') {
        store.templateEditId = el.getAttribute('data-tid');
        pushView('templateEdit');
        return;
      }
      if (act === 'save-tpl') {
        popView();
        return;
      }
      if (act === 'csv-next') {
        if (store.csvImport.step === 0) {
          store.csvImport = { step: 1, name: 'plovhana-grafik.csv' };
        } else if (store.csvImport.step === 1) {
          store.csvImport.step = 2;
        }
        saveStore();
        render();
        return;
      }
      if (act === 'csv-reset') {
        store.csvImport = { step: 0, name: '' };
        saveStore();
        render();
        return;
      }
      if (act === 'toggle-day') {
        var day = el.getAttribute('data-day');
        store.businessHours[day].off = !store.businessHours[day].off;
        saveStore();
        render();
        return;
      }
      if (act === 'swap-accept' || act === 'swap-decline') {
        store.swapRequests.incoming = [];
        saveStore();
        render();
        return;
      }
      if (act === 'team-member') {
        var mid = el.getAttribute('data-mid');
        var mem = store.team.find(function (x) {
          return x.id === mid;
        });
        if (mem) {
          var order = ['operator', 'admin', 'owner'];
          var ix = order.indexOf(mem.role);
          mem.role = order[(ix + 1) % order.length];
          Tg().impactOccurred();
          saveStore();
          render();
        }
        return;
      }
      if (act === 'toggle-push') {
        store.settings.push = !store.settings.push;
        saveStore();
        render();
        return;
      }
      if (act === 'close-cam') {
        store.ui.modal = null;
        store.ui.camTask = null;
        store.ui.camScan = false;
        saveStore();
        render();
        return;
      }
      if (act === 'cam-shot') {
        var ct = store.ui.camTask;
        store.ui.camScan = true;
        saveStore();
        render();
        setTimeout(function () {
          var task = tasksArr().find(function (x) {
            return x.id === ct;
          });
          if (task) {
            task.suspicious = Math.random() < 0.3;
            if (store.demoOffline) task.inQueue = true;
            else task.status = 'done';
          }
          store.ui.modal = null;
          store.ui.camTask = null;
          store.ui.camScan = false;
          saveStore();
          render();
        }, 1500);
        return;
      }
      if (act === 'waiver-reason') {
        store.ui.waiverReason = el.getAttribute('data-reason');
        saveStore();
        render();
        return;
      }
      if (act === 'waiver-send') {
        var wt = store.ui.waiver;
        var task = tasksArr().find(function (x) {
          return x.id === wt;
        });
        if (task) {
          task.status = 'waiver_pending';
          var tx = document.getElementById('waiver-txt');
          if (tx && tx.value) task.waiverComment = tx.value;
        }
        store.ui.modal = null;
        store.ui.waiver = null;
        saveStore();
        render();
        return;
      }
  }

  function Tg() {
    return window.Telegram.WebApp.HapticFeedback;
  }

  store.onboardingSlide = store.onboardingSlide | 0;
  if (store.phase === 'onboarding' && localStorage.getItem(ONBOARD_KEY)) {
    store.phase = 'app';
    saveStore();
  }

  window.addEventListener('online', function () {
    tasksArr().forEach(function (t) {
      if (t.inQueue) {
        t.inQueue = false;
        if (t.status !== 'waived') t.status = 'done';
      }
    });
    saveStore();
    render();
  });

  setInterval(function () {
    if (store.phase !== 'app' || currentView() !== 'liveMonitor') return;
    store.liveTick = (store.liveTick | 0) + 1;
    saveStore();
    render();
  }, 5000);

  render();
})();
  </script>
</body>
</html>
