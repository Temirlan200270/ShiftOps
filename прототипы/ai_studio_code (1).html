<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShiftOps Premium TWA</title>
  <style>
    :root {
      --bg: #000000;
      --surface: #121214;
      --surface-bright: #1c1c1e;
      --border: rgba(255, 255, 255, 0.08);
      --accent: #ffffff; /* Белый акцент — это премиально */
      --blue: #3b82f6;
      --text-main: #ffffff;
      --text-muted: #8e8e93;
      --success: #34c759;
      --danger: #ff3b30;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #000; color: var(--text-main); font-family: -apple-system, system-ui, sans-serif; line-height: 1.4; }

    /* Ограничитель ширины для десктопа */
    .app-container { max-width: 420px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; background: var(--bg); position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.5); }

    /* Header */
    .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
    .header-logo { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
    .header-dot { width: 6px; height: 6px; background: var(--blue); border-radius: 50%; }
    .header-date { font-size: 13px; color: var(--text-muted); }

    .content { flex: 1; padding: 16px; padding-bottom: 100px; }

    /* ДЕБАГ-ПАНЕЛЬ (оставляем как просил) */
    .debug-panel { background: #1c1c1e; padding: 12px; border-radius: 12px; margin-bottom: 20px; border: 1px dashed #333; }
    .debug-label { font-size: 10px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; display: block; }
    .seg { display: flex; gap: 4px; background: #000; padding: 2px; border-radius: 8px; margin-bottom: 8px; }
    .seg-btn { flex: 1; border: none; background: none; color: var(--text-muted); padding: 6px; font-size: 11px; border-radius: 6px; cursor: pointer; }
    .seg-btn.active { background: #333; color: #fff; }

    /* КАРТОЧКА СМЕНЫ */
    .shift-card { background: var(--surface); border-radius: 20px; padding: 20px; border: 1px solid var(--border); margin-bottom: 24px; }
    .shift-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
    .status-tag { font-size: 10px; font-weight: 800; text-transform: uppercase; padding: 4px 8px; border-radius: 6px; letter-spacing: 0.5px; }
    .status-live { background: rgba(52, 199, 89, 0.1); color: var(--success); }
    .status-none { background: rgba(255, 255, 255, 0.05); color: var(--text-muted); }
    
    .shift-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .shift-time { font-size: 14px; color: var(--text-muted); }

    /* Прогресс смены */
    .progress-box { margin: 16px 0; }
    .progress-text { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px; color: var(--text-muted); }
    .progress-bar { height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--blue); border-radius: 2px; transition: width 0.3s; }

    /* Кнопки */
    .btn-group { display: flex; gap: 8px; }
    .btn { flex: 1; border: none; border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
    .btn-main { background: var(--text-main); color: #000; }
    .btn-main:active { transform: scale(0.98); opacity: 0.9; }
    .btn-secondary { background: var(--surface-bright); color: #fff; }

    /* СПИСКИ МЕНЮ */
    .section-title { font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; padding-left: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .menu-list { background: var(--surface); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 24px; }
    .menu-item { display: flex; align-items: center; padding: 14px 16px; border-bottom: 1px solid var(--border); cursor: pointer; }
    .menu-item:last-child { border-bottom: none; }
    .menu-item:active { background: rgba(255,255,255,0.02); }
    .menu-ico { color: var(--blue); margin-right: 14px; display: flex; align-items: center; }
    .menu-body { flex: 1; }
    .menu-t { font-size: 15px; font-weight: 600; }
    .menu-s { font-size: 12px; color: var(--text-muted); }
    .menu-chevron { color: rgba(255,255,255,0.1); }

    /* TABBAR */
    .tabbar { position: absolute; bottom: 0; left: 0; right: 0; height: 70px; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; padding-bottom: 10px; }
    .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: var(--text-muted); border: none; background: none; cursor: pointer; }
    .tab.active { color: #fff; }
    .tab svg { width: 22px; height: 22px; stroke-width: 2; }
  </style>
</head>
<body>

<div class="app-container">
  <div class="header">
    <div class="header-logo"><div class="header-dot"></div> ShiftOps</div>
    <div class="header-date" id="currentDate">Пт, 02 Мая</div>
  </div>

  <div class="content">
    <!-- ДЕБАГ ПАНЕЛЬ -->
    <div class="debug-panel">
      <span class="debug-label">Режим демонстрации</span>
      <div class="seg" id="roleSeg">
        <button class="seg-btn active" onclick="updateRole('owner')">Владелец</button>
        <button class="seg-btn" onclick="updateRole('admin')">Админ</button>
        <button class="seg-btn" onclick="updateRole('operator')">Оператор</button>
      </div>
      <div class="seg" id="statusSeg">
        <button class="seg-btn" onclick="updateStatus('none')">Нет смены</button>
        <button class="seg-btn active" onclick="updateStatus('active')">Идет смена</button>
      </div>
    </div>

    <!-- ДИНАМИЧЕСКАЯ КАРТОЧКА СМЕНЫ -->
    <div id="shiftCardContainer"></div>

    <!-- ДИНАМИЧЕСКОЕ МЕНЮ -->
    <div id="menuContainer"></div>
  </div>

  <!-- TABBAR -->
  <div class="tabbar">
    <button class="tab active">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
      <span style="font-size: 10px;">Главная</span>
    </button>
    <button class="tab">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      <span style="font-size: 10px;">История</span>
    </button>
    <button class="tab">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
      <span style="font-size: 10px;">Профиль</span>
    </button>
  </div>
</div>

<script>
  let currentRole = 'owner';
  let currentStatus = 'active';

  const ICONS = {
    team: `<svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>`,
    chart: `<svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>`,
    calendar: `<svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>`,
    settings: `<svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg>`
  };

  function updateStatus(status) {
    currentStatus = status;
    render();
    document.querySelectorAll('#statusSeg .seg-btn').forEach((b, i) => b.classList.toggle('active', (i === 0 && status === 'none') || (i === 1 && status === 'active')));
  }

  function updateRole(role) {
    currentRole = role;
    render();
    document.querySelectorAll('#roleSeg .seg-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase().includes(role.slice(0,3))));
  }

  function render() {
    const cardCont = document.getElementById('shiftCardContainer');
    const menuCont = document.getElementById('menuContainer');

    // Рендер карточки
    if (currentStatus === 'none') {
      cardCont.innerHTML = `
        <div class="shift-card">
          <div class="shift-card-header"><span class="status-tag status-none">Свободен</span></div>
          <div class="shift-title">Сегодня смен нет</div>
          <p class="shift-time">Отдыхайте или свяжитесь с менеджером</p>
        </div>`;
    } else {
      cardCont.innerHTML = `
        <div class="shift-card">
          <div class="shift-card-header">
            <div>
              <div class="shift-title">Утренняя смена</div>
              <div class="shift-time">09:00 — 17:00 • Central Coffee</div>
            </div>
            <span class="status-tag status-live">Live</span>
          </div>
          <div class="progress-box">
            <div class="progress-text"><span>Чек-лист</span><span>2 / 6</span></div>
            <div class="progress-bar"><div class="progress-fill" style="width: 33%"></div></div>
          </div>
          <div class="btn-group">
            <button class="btn btn-main">Открыть чек-лист</button>
            <button class="btn btn-secondary">Камера</button>
          </div>
        </div>`;
    }

    // Рендер меню
    let html = '';
    if (currentRole === 'owner' || currentRole === 'admin') {
      html += `<div class="section-title">Управление</div>
        <div class="menu-list">
          <div class="menu-item"><div class="menu-ico">${ICONS.team}</div><div class="menu-body"><div class="menu-t">Команда</div><div class="menu-s">6 человек в штате</div></div><div class="menu-chevron">→</div></div>
          <div class="menu-item"><div class="menu-ico">${ICONS.chart}</div><div class="menu-body"><div class="menu-t">Аналитика</div><div class="menu-s">Средний балл 4.8 за неделю</div></div><div class="menu-chevron">→</div></div>
          <div class="menu-item"><div class="menu-ico">${ICONS.calendar}</div><div class="menu-body"><div class="menu-t">Расписание</div><div class="menu-s">Редактировать смены</div></div><div class="menu-chevron">→</div></div>
        </div>`;
    }

    html += `<div class="section-title">Аккаунт</div>
      <div class="menu-list">
        <div class="menu-item"><div class="menu-ico">${ICONS.settings}</div><div class="menu-body"><div class="menu-t">Настройки</div><div class="menu-s">Профиль, уведомления</div></div><div class="menu-chevron">→</div></div>
      </div>`;
    
    menuCont.innerHTML = html;
  }

  render();
</script>

</body>
</html>
