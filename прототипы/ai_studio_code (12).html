<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ShiftOps Pro | Ultimate TWA Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            /* Design Tokens v1.2 PRO + UX Files */
            --bg-base: #000000;
            --bg-glow: radial-gradient(circle at top right, #1E293B 0%, #0B1220 100%);
            --surface: rgba(22, 33, 58, 0.6);
            --surface-bright: rgba(30, 41, 59, 0.8);
            --border: rgba(255, 255, 255, 0.08);
            
            --primary: #4F7CFF;
            --primary-glow: rgba(79, 124, 255, 0.3);
            --success: #30A46C;
            --warning: #F5A524;
            --critical: #E5484D;
            
            --text-main: #F8FAFC;
            --text-secondary: #CBD5E1;
            --text-muted: #94A3B8;

            --ease-ios: cubic-bezier(0.32, 0.72, 0, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        
        body { 
            background: var(--bg-base); 
            color: var(--text-main); 
            overflow: hidden; 
            height: 100vh;
            width: 100vw;
        }

        /* --- APP SHELL --- */
        .app-shell {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg-glow);
            position: relative;
        }

        /* --- HEADER --- */
        .header {
            padding: 16px 20px;
            display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            background: rgba(11, 18, 32, 0.8);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            transition: background 0.5s var(--ease-ios);
        }

        .logo { font-size: 20px; font-weight: 800; display: flex; align-items: center; gap: 10px; letter-spacing: -0.04em; }
        .logo-dot { width: 8px; height: 8px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 15px var(--primary); }

        /* --- VIEW ROUTER --- */
        .view-container { flex: 1; position: relative; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .view-container::-webkit-scrollbar { display: none; }
        .view { display: none; animation: view-in 0.4s var(--ease-ios); }
        .view.active { display: block; }
        @keyframes view-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- UI COMPONENTS --- */
        .glass-card {
            background: var(--surface); backdrop-filter: blur(24px);
            border: 1px solid var(--border); border-radius: 24px;
            padding: 20px; margin-bottom: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .btn {
            padding: 18px; border-radius: 18px; border: none; font-weight: 700; font-size: 15px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            cursor: pointer; transition: 0.2s; width: 100%;
        }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 20px var(--primary-glow); }
        .btn-secondary { background: var(--bg-elevated); color: white; border: 1px solid var(--border); }
        .btn-disabled { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }

        /* --- TASK COMPONENT --- */
        .section-title { font-size: 12px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin: 24px 0 12px 4px; }
        .task-card {
            background: rgba(255,255,255,0.03); border-radius: 18px; padding: 18px;
            margin-bottom: 10px; border: 1px solid var(--border);
            display: flex; align-items: center; gap: 16px; transition: 0.2s;
        }
        .task-card.critical { border-left: 4px solid var(--critical); }
        .task-card.done { opacity: 0.4; border-left-color: var(--success); }
        .task-card.waived { border-left-color: var(--warning); background: rgba(245, 165, 36, 0.05); }

        .checkbox {
            width: 26px; height: 26px; border: 2.5px solid var(--border); border-radius: 8px;
            flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        .task-card.done .checkbox { background: var(--success); border-color: var(--success); }
        .task-card.waived .checkbox { background: var(--warning); border-color: var(--warning); }

        /* --- SCORE & PROGRESS --- */
        .score-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; }
        .score-val { font-size: 42px; font-weight: 800; line-height: 1; letter-spacing: -0.05em; }
        .prog-track { height: 8px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; margin-bottom: 12px; }
        .prog-fill { height: 100%; background: linear-gradient(90deg, var(--primary), #82a3ff); width: 0%; transition: width 1s var(--ease-ios); }

        /* --- NAVIGATION BAR --- */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; height: 85px;
            background: rgba(11, 18, 32, 0.9); backdrop-filter: blur(25px);
            border-top: 1px solid var(--border); display: flex;
            justify-content: space-around; padding-bottom: env(safe-area-inset-bottom);
            z-index: 1000; transition: transform 0.3s;
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; color: var(--text-muted); cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; }

        /* --- BOTTOM SHEET --- */
        .sheet-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px); z-index: 2000;
            display: none; align-items: flex-end;
        }
        .sheet-overlay.active { display: flex; }
        .sheet {
            background: var(--bg-elevated); width: 100%; border-radius: 32px 32px 0 0;
            padding: 24px; transform: translateY(100%);
            transition: transform 0.4s var(--ease-ios);
        }
        .sheet-overlay.active .sheet { transform: translateY(0); }
        .sheet-handle { width: 40px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin: 0 auto 24px; }

        /* --- DEV TOOLS --- */
        .dev-switcher {
            position: fixed; top: 75px; right: 15px; z-index: 5000;
            background: var(--primary); color: white; padding: 8px 14px;
            border-radius: 100px; font-size: 10px; font-weight: 800;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); cursor: pointer;
        }

        /* --- CAMERA SCAN ANIM --- */
        .camera-view { width: 100%; aspect-ratio: 1; background: #000; border-radius: 24px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; margin-bottom: 24px; }
        .scan-line { position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--primary); box-shadow: 0 0 15px var(--primary); animation: scan 2s infinite linear; display: none; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        /* --- HEATMAP --- */
        .heatmap { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-top: 16px; }
        .heat-cell { aspect-ratio: 1; border-radius: 4px; background: rgba(255,255,255,0.05); }
        .heat-cell.level-3 { background: var(--primary); }

        /* --- SYNC INDICATOR --- */
        .sync-badge { font-size: 9px; background: var(--warning); color: black; padding: 2px 6px; border-radius: 4px; font-weight: 800; margin-left: 8px; display: none; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="dev-switcher" onclick="Engine.toggleRole()">ROLE: <span id="dev-role">OPERATOR</span></div>

    <header class="header" id="app-header">
        <div class="logo"><div class="logo-dot"></div> ShiftOps</div>
        <div id="header-right"></div>
    </header>

    <main class="view-container" id="view-port">
        <!-- Screens: Onboarding, Dashboard, Analytics, Team -->
    </main>

    <nav class="nav-bar" id="nav-bar"></nav>
</div>

<!-- Global Bottom Sheet -->
<div class="sheet-overlay" id="sheet-overlay" onclick="UI.closeSheet()">
    <div class="sheet" id="sheet" onclick="event.stopPropagation()">
        <div class="sheet-handle"></div>
        <div id="sheet-content"></div>
    </div>
</div>

<script>
    /**
     * SHIFTOPS SOVEREIGN ENGINE v1.2 PRO
     * Reactive Store + SPA Router + HoReCa Logic
     */

    const Store = {
        role: 'operator', 
        view: 'onboarding',
        shiftStatus: 'none', // 'none', 'active'
        isOffline: false,
        
        // Data Schema
        tasks: [
            { id: 1, section: 'Безопасность', title: 'Температурный лист (Плов)', crit: true, photo: true, done: false, waived: false },
            { id: 2, section: 'Безопасность', title: 'Проверка сроков годности', crit: true, photo: false, done: false, waived: false },
            { id: 3, section: 'Чистота', title: 'Маркировка соусов', crit: false, photo: true, done: false, waived: false },
            { id: 4, section: 'Чистота', title: 'Санитария санузлов', crit: false, photo: true, done: false, waived: false },
            { id: 5, section: 'Зал', title: 'Пролив кофемашины', crit: false, photo: false, done: false, waived: false }
        ],

        team: [
            { id: 'u1', name: 'Александр В.', job: 'Шеф-повар', role: 'operator', score: 98.4 },
            { id: 'u2', name: 'Иван Дорн', job: 'Бармен', role: 'bartender', score: 72.1 },
            { id: 'u3', name: 'Мария К.', job: 'Администратор', role: 'admin', score: 94.0 }
        ],

        // Score Engine Formula V1
        getScore() {
            const total = this.tasks.length;
            const done = this.tasks.filter(t => t.done || t.waived).length;
            const criticalTotal = this.tasks.filter(t => t.crit).length;
            const criticalDone = this.tasks.filter(t => t.crit && (t.done || t.waived)).length;

            const completion = done / total;
            const criticalCompliance = (criticalDone === criticalTotal) ? 1.0 : 0.0;
            
            // timeliness & photo_quality simulated for MVP
            const score = 100 * (0.50 * completion + 0.25 * criticalCompliance + 0.15 * 1.0 + 0.10 * 1.0);
            return Math.round(score * 10) / 10;
        }
    };

    const Engine = {
        toggleRole() {
            Store.role = Store.role === 'operator' ? 'owner' : 'operator';
            Store.view = Store.role === 'owner' ? 'overview' : 'dashboard';
            document.getElementById('dev-role').innerText = Store.role.toUpperCase();
            UI.init();
        },

        navigate(viewId) {
            Store.view = viewId;
            UI.render();
        },

        claimShift() {
            Store.shiftStatus = 'active';
            UI.haptic('impact');
            UI.render();
        }
    };

    const UI = {
        init() {
            this.renderNav();
            this.render();
        },

        render() {
            const port = document.getElementById('view-port');
            const headerRight = document.getElementById('header-right');
            const appHeader = document.getElementById('app-header');

            // 1. Header Context & Color Magic (PRD v1.2)
            const hasCritError = Store.tasks.some(t => t.crit && !t.done && !t.waived);
            if (Store.shiftStatus === 'active') {
                appHeader.style.background = hasCritError ? 'rgba(43, 18, 22, 0.9)' : 'rgba(11, 18, 32, 0.8)';
            }

            if (Store.role === 'owner') {
                headerRight.innerHTML = `<div style="width:32px; height:32px; border-radius:50%; background:var(--primary); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:12px;">АВ</div>`;
                this.renderOwnerViews(port);
            } else {
                headerRight.innerHTML = `<div style="font-size:11px; font-weight:700; color:var(--text-muted);">02 МАЯ • ПЛОВХАНА #1</div>`;
                this.renderOperatorViews(port);
            }
        },

        renderOperatorViews(container) {
            if (Store.view === 'onboarding') {
                container.innerHTML = `
                    <div style="height:70vh; display:flex; flex-direction:column; justify-content:center;">
                        <h1 style="font-size:36px; font-weight:800; line-height:1.1; margin-bottom:16px;">Линейный контроль <span style="color:var(--primary)">ShiftOps</span></h1>
                        <p style="color:var(--text-secondary); font-size:17px; margin-bottom:40px;">Премиальный стандарт управления сменой в вашем кармане.</p>
                        <button class="btn btn-primary" onclick="Engine.navigate('dashboard')">Начать работу</button>
                    </div>
                `;
                return;
            }

            if (Store.shiftStatus === 'none') {
                container.innerHTML = `
                    <h1 style="font-size:28px; font-weight:800; margin-bottom:24px; letter-spacing:-0.04em;">Посты</h1>
                    <div class="glass-card">
                        <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
                            <div style="font-weight:700; font-size:18px;">Кухня (Основная)</div>
                            <div style="font-size:10px; font-weight:800; color:var(--primary); text-transform:uppercase;">Свободно</div>
                        </div>
                        <p style="font-size:13px; color:var(--text-muted); margin-bottom:20px;">Шаблон: Открытие ресторана</p>
                        <button class="btn btn-primary" onclick="Engine.claimShift()">⚡️ Занять пост</button>
                    </div>
                `;
            } else {
                const score = Store.getScore();
                const progress = (Store.tasks.filter(t => t.done || t.waived).length / Store.tasks.length) * 100;
                
                let html = `
                    <div class="glass-card" style="border-left: 4px solid var(--primary);">
                        <div class="score-row">
                            <div>
                                <div style="font-size:11px; font-weight:800; color:var(--primary); text-transform:uppercase; margin-bottom:4px;">Активная смена</div>
                                <h2 style="font-size:22px; font-weight:800;">Кухня (Основная)</h2>
                            </div>
                            <div style="text-align:right">
                                <div class="score-val">${score}</div>
                                <div style="font-size:9px; font-weight:700; color:var(--text-muted); text-transform:uppercase;">Балл V1</div>
                            </div>
                        </div>
                        <div class="prog-track"><div class="prog-fill" style="width:${progress}%"></div></div>
                        <div style="font-size:12px; font-weight:600; color:var(--text-muted);">Прогресс: ${Math.round(progress)}%</div>
                    </div>
                `;

                // Render Sections (Best from Files)
                const sections = [...new Set(Store.tasks.map(t => t.section))];
                sections.forEach(sec => {
                    html += `<div class="section-title">${sec}</div>`;
                    Store.tasks.filter(t => t.section === sec).forEach(task => {
                        html += `
                            <div class="task-card ${task.crit ? 'critical' : ''} ${task.done ? 'done' : ''} ${task.waived ? 'waived' : ''}" onclick="UI.openTask(${task.id})">
                                <div class="checkbox">${task.done ? '✓' : (task.waived ? '!' : '')}</div>
                                <div style="flex:1">
                                    <div class="task-t">${task.title}</div>
                                    <div class="task-s">${task.crit ? 'КРИТ' : 'ОБЯЗ'} ${task.photo ? '• ФОТО' : ''}</div>
                                </div>
                                <div class="sync-badge">SYNCING</div>
                            </div>
                        `;
                    });
                });

                html += `<button class="btn btn-secondary ${hasCritError ? 'btn-disabled' : ''}" style="margin-top:20px;" onclick="UI.closeShift()">Завершить смену</button>`;
                container.innerHTML = html;
            }
        },

        renderOwnerViews(container) {
            if (Store.view === 'overview') {
                container.innerHTML = `
                    <h1 style="font-size:28px; font-weight:800; margin-bottom:24px; letter-spacing:-0.04em;">Обзор сети</h1>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px;">
                        <div class="glass-card" style="margin:0; padding:16px;">
                            <div style="font-size:24px; font-weight:800;">94.2</div>
                            <div style="font-size:10px; font-weight:700; color:var(--text-muted); text-transform:uppercase;">Ср. балл</div>
                        </div>
                        <div class="glass-card" style="margin:0; padding:16px;">
                            <div style="font-size:24px; font-weight:800; color:var(--critical);">2</div>
                            <div style="font-size:10px; font-weight:700; color:var(--text-muted); text-transform:uppercase;">Нарушения</div>
                        </div>
                    </div>
                    
                    <div class="section-title">Интенсивность нарушений</div>
                    <div class="glass-card">
                        <div class="heatmap">
                            ${Array(28).fill(0).map((_, i) => `<div class="heat-cell ${i % 5 === 0 ? 'level-3' : ''}"></div>`).join('')}
                        </div>
                    </div>

                    <div class="section-title">Leaderboard</div>
                    ${Store.team.map(m => `
                        <div class="task-card" style="padding:14px; opacity:1;">
                            <div style="width:36px; height:36px; border-radius:50%; background:var(--primary); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:12px;">${m.name[0]}</div>
                            <div style="flex:1">
                                <div style="font-weight:700; font-size:14px;">${m.name}</div>
                                <div style="font-size:11px; color:var(--text-muted);">${m.job}</div>
                            </div>
                            <div style="font-weight:800; color:${m.score > 90 ? 'var(--success)' : 'var(--critical)'}">${m.score}</div>
                        </div>
                    `).join('')}
                `;
            } else if (Store.view === 'team') {
                container.innerHTML = `
                    <h1 style="font-size:28px; font-weight:800; margin-bottom:24px;">Команда</h1>
                    ${Store.team.map(m => `
                        <div class="task-card" style="opacity:1;" onclick="UI.manageMember('${m.id}')">
                            <div style="width:44px; height:44px; border-radius:50%; background:var(--surface-bright); display:flex; align-items:center; justify-content:center; font-weight:800; color:var(--primary);">${m.name[0]}</div>
                            <div style="flex:1">
                                <div style="font-weight:700;">${m.name}</div>
                                <div style="font-size:11px; color:var(--text-muted); text-transform:uppercase;">${m.role} • ${m.job}</div>
                            </div>
                            <div style="color:var(--text-muted); opacity:0.3;">→</div>
                        </div>
                    `).join('')}
                `;
            }
        },

        renderNav() {
            const nav = document.getElementById('nav-bar');
            if (Store.view === 'onboarding') { nav.style.transform = 'translateY(100%)'; return; }
            nav.style.transform = 'translateY(0)';

            const items = Store.role === 'operator' ? 
                [{id:'dashboard', lbl:'Смена', ico:'🏠'}, {id:'history', lbl:'История', ico:'🕒'}] :
                [{id:'overview', lbl:'Обзор', ico:'📊'}, {id:'team', lbl:'Команда', ico:'👥'}, {id:'settings', lbl:'Опции', ico:'⚙️'}];
            
            nav.innerHTML = items.map(i => `
                <div class="nav-item ${Store.view === i.id ? 'active' : ''}" onclick="Engine.navigate('${i.id}')">
                    <div style="font-size:24px;">${i.ico}</div>
                    <div class="nav-lbl">${i.lbl}</div>
                </div>
            `).join('');
        },

        openTask(id) {
            const task = Store.tasks.find(t => t.id === id);
            if (task.done) return;

            let content = `
                <h2 style="font-size:22px; font-weight:800; margin-bottom:12px;">${task.title}</h2>
                <p style="color:var(--text-muted); font-size:14px; margin-bottom:24px;">Стандарт PlovKhana: Качество фото и чистота поверхности.</p>
            `;

            if (task.photo) {
                content += `
                    <div class="camera-view">
                        <div class="scan-line" id="scan-line"></div>
                        <div style="font-size:40px;">📷</div>
                    </div>
                    <button class="btn btn-primary" onclick="UI.simulatePhoto(${id})">Сделать снимок (pHash Scan)</button>
                `;
            } else {
                content += `<button class="btn btn-primary" onclick="UI.completeTask(${id})">Завершить задачу</button>`;
            }

            content += `<button class="btn btn-secondary" style="margin-top:12px;" onclick="UI.openWaiver(${id})">Не могу выполнить (Waiver)</button>`;
            this.openSheet(content);
        },

        simulatePhoto(id) {
            const line = document.getElementById('scan-line');
            line.style.display = 'block';
            this.haptic('impact');
            setTimeout(() => {
                this.completeTask(id);
                this.haptic('notification');
                if (Store.getScore() >= 100) this.celebrate();
            }, 1500);
        },

        openWaiver(id) {
            this.openSheet(`
                <h2 style="font-size:22px; font-weight:800; margin-bottom:12px;">Освобождение</h2>
                <p style="color:var(--text-muted); font-size:14px; margin-bottom:20px;">Выберите причину:</p>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;">
                    <button class="btn btn-secondary" onclick="UI.applyWaiver(${id})">🛠 Сломано</button>
                    <button class="btn btn-secondary" onclick="UI.applyWaiver(${id})">📦 Нет товара</button>
                </div>
                <textarea placeholder="Комментарий..." style="width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:12px; padding:12px; color:white; min-height:80px;"></textarea>
                <button class="btn btn-primary" style="margin-top:20px;" onclick="UI.applyWaiver(${id})">Отправить админу</button>
            `);
        },

        applyWaiver(id) {
            const task = Store.tasks.find(t => t.id === id);
            task.waived = true;
            this.render(); this.closeSheet();
        },

        completeTask(id) {
            const task = Store.tasks.find(t => t.id === id);
            task.done = true;
            this.render(); this.closeSheet();
        },

        manageMember(id) {
            const member = Store.team.find(m => m.id === id);
            this.openSheet(`
                <h2 style="font-size:22px; font-weight:800; margin-bottom:8px;">${member.name}</h2>
                <p style="color:var(--text-muted); margin-bottom:24px;">Управление ролью участника</p>
                <button class="btn btn-secondary" style="margin-bottom:10px; justify-content:space-between;"><span>Bartender</span> ${member.role === 'bartender' ? '✓' : ''}</button>
                <button class="btn btn-secondary" style="margin-bottom:10px; justify-content:space-between;"><span>Operator</span> ${member.role === 'operator' ? '✓' : ''}</button>
                <button class="btn btn-secondary" style="margin-bottom:30px; justify-content:space-between;"><span>Admin</span> ${member.role === 'admin' ? '✓' : ''}</button>
                <button class="btn btn-primary" style="background:var(--critical);" onclick="UI.closeSheet()">Деактивировать</button>
            `);
        },

        closeShift() {
            if (Store.tasks.some(t => t.crit && !t.done && !t.waived)) return;
            this.celebrate();
            alert("Смена закрыта с баллом " + Store.getScore());
            Store.shiftStatus = 'none';
            this.render();
        },

        openSheet(content) { document.getElementById('sheet-content').innerHTML = content; document.getElementById('sheet-overlay').classList.add('active'); },
        closeSheet() { document.getElementById('sheet-overlay').classList.remove('active'); },
        haptic(type) { console.log('Haptic:', type); },
        celebrate() { confetti({ particleCount: 150, spread: 70, origin: { y: 0.8 }, colors: ['#4F7CFF', '#30A46C', '#ffffff'] }); }
    };

    window.onload = () => UI.init();
</script>
</body>
</html>
