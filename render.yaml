# Render Blueprint for ShiftOps API.
#
# This file lives at the repo root because Render needs to find it there.
# Importing it via Render UI ("New + → Blueprint → connect repo") creates
# a single Web Service that runs `supervisord` (api + taskiq worker in one
# container) — same deployment topology as the Fly.io plan in DEPLOY.md,
# only on Render.
#
# Why one container instead of two services:
# - Cheapest path: $7/mo Starter plan vs ~$14/mo if we split api & worker.
# - At MVP scale (a bar = a few RPS) supervisord-managed multi-process is
#   the right balance of simplicity and reliability — see
#   apps/api/deploy/supervisord.conf for the rationale.
#
# Why region `frankfurt`:
# - Same eu-central-1 region as Supabase Postgres and Upstash Redis, so
#   query latency stays sub-millisecond inside the data path.
#
# Secrets policy:
# - Anything `sync: false` MUST be filled in the Render dashboard or via
#   the MCP after this Blueprint is applied. We do NOT commit credentials.
# - Plain `value:` is for non-secret config that we want versioned.
#
# Pre-deploy hook:
# - `alembic upgrade head` runs before each new release goes live; if a
#   migration fails the rollout is aborted and the previous revision keeps
#   serving traffic. Available on Starter+ plans.

services:
  - type: web
    name: shiftops-api
    runtime: docker
    region: frankfurt
    plan: starter
    branch: main
    autoDeploy: true
    rootDir: apps/api
    dockerfilePath: ./Dockerfile
    dockerCommand: /usr/bin/supervisord -c /etc/supervisor/conf.d/shiftops.conf -n
    healthCheckPath: /healthz
    preDeployCommand: alembic upgrade head
    envVars:
      # Render scans logs for the listening port. Pinning PORT=8000 keeps
      # the value in sync with apps/api/deploy/supervisord.conf, which has
      # `--port 8000` baked into the uvicorn command.
      - key: PORT
        value: "8000"

      # --- Non-secret runtime config ----------------------------------------
      - key: APP_ENV
        value: production
      - key: APP_NAME
        value: ShiftOps
      - key: LOG_LEVEL
        value: INFO
      - key: API_HOST
        value: "0.0.0.0"
      - key: API_PORT
        value: "8000"
      - key: API_PUBLIC_URL
        value: https://shiftops-api.onrender.com
      - key: API_CORS_ORIGINS
        value: https://shiftops-web.vercel.app,http://localhost:3000

      - key: DB_POOL_SIZE
        value: "5"
      - key: DB_POOL_MAX_OVERFLOW
        value: "10"
      - key: DB_POOL_RECYCLE_SECONDS
        value: "1800"

      - key: JWT_ACCESS_TTL_SECONDS
        value: "900"
      - key: JWT_REFRESH_TTL_SECONDS
        value: "604800"

      - key: TG_BOT_USERNAME
        value: ShiftOpsBot
      - key: TG_WEBHOOK_PATH
        value: /api/v1/telegram/webhook

      - key: STORAGE_PROVIDER
        value: telegram

      - key: ANTIFAKE_PHASH_THRESHOLD
        value: "5"
      - key: ANTIFAKE_HISTORY_LOOKBACK
        value: "50"

      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0.1"

      - key: FEATURE_OFFLINE_QUEUE
        value: "true"
      - key: FEATURE_ANALYTICS_DASHBOARD
        value: "false"
      - key: FEATURE_BILLING
        value: "false"

      # --- Secrets (fill in Render dashboard, NEVER commit) -----------------
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_SYNC
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: TG_BOT_TOKEN
        sync: false
      - key: TG_WEBHOOK_SECRET
        sync: false
      - key: TG_ARCHIVE_CHAT_ID
        sync: false
      - key: SENTRY_DSN
        sync: false
