<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ShiftOps Pro Dashboard</title>
    <style>
        :root {
            --bg: #000000;
            --surface: #0c0c0e;
            --card: #151518;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #ffffff;
            --blue: #2f80ed;
            --text-main: #ffffff;
            --text-muted: #86868b;
            --success: #32d74b;
            --warning: #ffd60a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text-main); font-family: -apple-system, system-ui, sans-serif; overflow: hidden; }

        .app { max-width: 420px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; position: relative; }

        /* HEADER */
        .header { padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 50; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        .logo { font-size: 17px; font-weight: 800; display: flex; align-items: center; gap: 8px; letter-spacing: -0.4px; }
        .logo-dot { width: 6px; height: 6px; background: var(--blue); border-radius: 50%; box-shadow: 0 0 10px var(--blue); }
        .user-avatar { width: 32px; height: 32px; background: var(--card); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; border: 1px solid var(--border); }

        .scroll-area { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 100px; -webkit-overflow-scrolling: touch; }
        .scroll-area::-webkit-scrollbar { display: none; }

        /* WIDGETS */
        .widget-live { background: linear-gradient(145deg, #151518 0%, #0c0c0e 100%); border-radius: 20px; padding: 18px; border: 1px solid var(--border); margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
        .live-info { display: flex; flex-direction: column; gap: 4px; }
        .live-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--success); font-weight: 700; display: flex; align-items: center; gap: 5px; }
        .live-dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .live-val { font-size: 15px; font-weight: 600; color: #fff; }

        /* GRID 2x2 */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
        .grid-item { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 12px; transition: 0.2s; }
        .grid-item:active { transform: scale(0.96); background: #1c1c1f; }
        .grid-ico { width: 36px; height: 36px; border-radius: 10px; background: rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: center; color: var(--blue); }
        .grid-title { font-size: 15px; font-weight: 600; }
        .grid-sub { font-size: 11px; color: var(--text-muted); line-height: 1.3; }

        /* ACTION CARD (OPERATOR) */
        .action-card { background: var(--card); border-radius: 24px; padding: 24px; border: 1px solid var(--border); margin-bottom: 24px; text-align: center; }
        .action-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
        .action-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; }
        .btn-main { background: #fff; color: #000; border: none; width: 100%; padding: 18px; border-radius: 16px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-main:active { transform: scale(0.97); }

        /* SECONDARY LIST */
        .sec-title { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin: 0 0 10px 4px; }
        .list { background: var(--card); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 24px; }
        .item { padding: 16px 20px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .item:last-child { border-bottom: none; }
        .item:active { background: rgba(255,255,255,0.02); }
        .item-ico { color: var(--text-muted); }
        .item-t { font-size: 15px; font-weight: 500; }
        .item-chev { margin-left: auto; color: rgba(255,255,255,0.1); }

        /* TABS */
        .tabs { position: absolute; bottom: 0; width: 100%; height: 74px; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; padding-bottom: 10px; }
        .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: var(--text-muted); cursor: pointer; }
        .tab.active { color: #fff; }
        .tab svg { width: 22px; height: 22px; stroke-width: 2.2; }
        .tab-lbl { font-size: 10px; font-weight: 600; }

        /* DEBUG */
        .debug { background: #1c1c1e; padding: 12px; border-radius: 14px; margin-bottom: 20px; border: 1px dashed #444; }
        .seg { display: flex; gap: 4px; background: #000; padding: 2px; border-radius: 8px; margin-top: 8px; }
        .seg-btn { flex: 1; border: none; background: none; color: #555; padding: 6px; font-size: 11px; font-weight: 600; border-radius: 6px; cursor: pointer; }
        .seg-btn.on { background: #333; color: #fff; }
    </style>
</head>
<body>

<div class="app">
    <header class="header">
        <div class="logo"><div class="logo-dot"></div> ShiftOps</div>
        <div id="header-right"></div>
    </header>

    <main class="scroll-area" id="main-scroll">
        <!-- ТЕСТОВАЯ ПАНЕЛЬ -->
        <div class="debug">
            <div style="font-size: 10px; color: #888; font-weight: 800; text-transform: uppercase;">Тест Роли</div>
            <div class="seg">
                <button class="seg-btn on" onclick="setRole('owner', this)">Владелец</button>
                <button class="seg-btn" onclick="setRole('operator', this)">Оператор</button>
            </div>
        </div>

        <div id="dynamic-content"></div>
    </main>

    <nav class="tabs" id="tabbar">
        <!-- Tabs generate dynamically -->
    </nav>
</div>

<script>
    let currentRole = 'owner';

    const ICONS = {
        analytics: `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 8v8m-4-5v5m-4-2v2m-2 4h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>`,
        team: `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>`,
        schedule: `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>`,
        templates: `<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>`,
        home: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 12l9-9 9 9M5 10v10h14V10"></path></svg>`,
        history: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`,
        profile: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>`
    };

    function setRole(role, btn) {
        currentRole = role;
        document.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('on'));
        btn.classList.add('on');
        render();
    }

    function render() {
        const content = document.getElementById('dynamic-content');
        const headerRight = document.getElementById('header-right');
        const tabbar = document.getElementById('tabbar');

        if (currentRole === 'owner') {
            // RENDER OWNER DASHBOARD
            headerRight.innerHTML = `<div class="user-avatar">АВ</div>`;
            content.innerHTML = `
                <div class="widget-live">
                    <div class="live-info">
                        <div class="live-label"><div class="live-dot"></div> Эфир</div>
                        <div class="live-val">4 чел. на смене</div>
                    </div>
                    <div class="live-info" style="align-items: flex-end;">
                        <div style="font-size: 11px; color: #555; font-weight: 700;">KPI СЕГОДНЯ</div>
                        <div class="live-val" style="color: var(--warning)">4.8 балла</div>
                    </div>
                </div>

                <div class="grid">
                    <div class="grid-item">
                        <div class="grid-ico">${ICONS.analytics}</div>
                        <div>
                            <div class="grid-title">Аналитика</div>
                            <div class="grid-sub">Тренды и нарушения</div>
                        </div>
                    </div>
                    <div class="grid-item">
                        <div class="grid-ico">${ICONS.team}</div>
                        <div>
                            <div class="grid-title">Команда</div>
                            <div class="grid-sub">Роли и доступ</div>
                        </div>
                    </div>
                    <div class="grid-item">
                        <div class="grid-ico">${ICONS.schedule}</div>
                        <div>
                            <div class="grid-title">График</div>
                            <div class="grid-sub">Сетка заведения</div>
                        </div>
                    </div>
                    <div class="grid-item">
                        <div class="grid-ico">${ICONS.templates}</div>
                        <div>
                            <div class="grid-title">Шаблоны</div>
                            <div class="grid-sub">Конструктор задач</div>
                        </div>
                    </div>
                </div>

                <div class="sec-title">Второстепенное</div>
                <div class="list">
                    <div class="item"><div class="item-t">Импорт расписания</div><div class="item-chev">→</div></div>
                    <div class="item"><div class="item-t">Журнал действий</div><div class="item-chev">→</div></div>
                </div>
            `;
            tabbar.innerHTML = `
                <div class="tab active">${ICONS.home}<span class="tab-lbl">Обзор</span></div>
                <div class="tab">${ICONS.team}<span class="tab-lbl">Команда</span></div>
                <div class="tab">${ICONS.analytics}<span class="tab-lbl">KPI</span></div>
                <div class="tab">${ICONS.profile}<span class="tab-lbl">Настройки</span></div>
            `;
        } else {
            // RENDER OPERATOR FOCUS MODE
            headerRight.innerHTML = `<div class="date-pill" style="font-size: 12px; color: #555;">Пт, 02 Мая</div>`;
            content.innerHTML = `
                <div class="action-card">
                    <div class="action-title">Утренняя смена</div>
                    <div class="action-sub">Начнется через 14:05</div>
                    <button class="btn-main">Начать смену</button>
                </div>

                <div class="sec-title">Моя работа</div>
                <div class="list">
                    <div class="item"><div class="item-t">Мой график</div><div class="item-chev">→</div></div>
                    <div class="item"><div class="item-t">История смен</div><div class="item-chev">→</div></div>
                    <div class="item"><div class="item-t">Помощь</div><div class="item-chev">→</div></div>
                </div>
            `;
            tabbar.innerHTML = `
                <div class="tab active">${ICONS.home}<span class="tab-lbl">Смена</span></div>
                <div class="tab">${ICONS.history}<span class="tab-lbl">История</span></div>
                <div class="tab">${ICONS.profile}<span class="tab-lbl">Профиль</span></div>
            `;
        }
    }

    render();
</script>

</body>
</html>
